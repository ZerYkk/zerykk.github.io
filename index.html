ové tabulky první úrovně je uložena ve speciálním registru procesoru.", "a": false}, {"ch": "I. Virtualizace paměti", "q": "Register MMU obsahuje virtuálnu adresu stránkovej tabuľky.", "a": false}, {"ch": "II. Virtualizace procesoru", "q": "Výpočet programu je řízen jeho textem - vhodně zakódovanými instrukcemi uloženými v paměti.", "a": true}, {"ch": "II. Virtualizace procesoru", "q": "Výpočet každého programu může být ovlivněn změnou hodnoty v registru periferie, protože těmto registrům jsou přiděleny fyzické adresy.", "a": false}, {"ch": "II. Virtualizace procesoru", "q": "Do výpočtu programu může být zasaženo vnější entitou, např. v situaci, kdy některá jeho virtuální adresa odpovídá fyzické adrese periferie.", "a": true}, {"ch": "II. Virtualizace procesoru", "q": "Programový čítač je vyhrazený registr, který obsahuje fyzickou adresu právě vykonávané instrukce.", "a": false}, {"ch": "II. Virtualizace procesoru", "q": "Programový čítač je vyhrazený registr, který obsahuje virtuální adresu právě vykonávané instrukce.", "a": true}, {"ch": "II. Virtualizace procesoru", "q": "Instrukce je ucelený elementární příkaz pro procesor. Každou instrukci lze zakódovat jako číslo nebo třeba posloupnost bajtů.", "a": true}, {"ch": "II. Virtualizace procesoru", "q": "Instrukce je ucelený elementární příkazy pro procesor. Většinu instrukci (nikoliv ale všechny) lze zakódovat jako číslo nebo třeba posloupnost bajtů.", "a": false}, {"ch": "II. Virtualizace procesoru", "q": "Instrukce je schéma, do kterého je potřeba doplnit konkrétní registry, aby ji bylo možné vykonat.", "a": false}, {"ch": "II. Virtualizace procesoru", "q": "Instrukce udává jak samotnou operaci, tak konkrétní registry, se kterými se má tato operace provést.", "a": true}, {"ch": "II. Virtualizace procesoru", "q": "Po provedení instrukce se pokračuje instrukcí uloženou na nejbližší vyšší virtuální adrese. Některé instrukce (zejména instrukce skoku) ale mohou toto pořadí změnit.", "a": true}, {"ch": "II. Virtualizac  je kritickou sekci vůči R.", "a": false}, {"ch": "V. Souběžnost a synchronizace", "q": "V problému čtenářů a písařů platí, že čtenáři si vzájemně nepřekáží - může jich s datovou strukturou pracovat několik najednou.", "a": true}, {"ch": "V. Souběžnost a synchronizace", "q": "V problému čtenářů a písařů platí, že čtenáři si vzájemně nepřekáží - s datovou strukturou může pracovat v libovolnou chvíli nejvýše jeden.", "a": false}, {"ch": "V. Souběžnost a synchronizace", "q": "V problému čtenárů a pisařů plati, že pisaři si vzájemne nepřekázi - můze jich s datovou strukturou pracovat několik najednou.", "a": false}, {"ch": "V. Souběžnost a synchronizace", "q": "Problém čtenářů a písarů nelze, na rozdil od kriticke sekce, řešit synchronizaci.", "a": false}, {"ch": "V. Souběžnost a synchronizace", "q": "Podobně jako problém hladoveni, problém čtenářů a písařů lze řešit synchronizaci.", "a": false}, {"ch": "VI. Synchronizace", "q": "Podmínková proměnná řeší problém čtenářů a písařů.", "a": false}, {"ch": "VI. Synchronizace", "q": "Při odemčeni rychlého mutexu vlákno pomocí počítadla ověri, existuje-li nějaké čekající vlákno; pokud ano, požádá system o jeho probuzeni.", "a": true}, {"ch": "VI. Synchronizace", "q": "Při odemčeni spinlocku vlákno pomocí počítadla ověri, existuje-li nějaké čekající vlákno...", "a": false}, {"ch": "VI. Synchronizace", "q": "Při zamčeni rychlého mutexu se vlakno nejprve pokusi provest klasicke zamčeni spinlocku; neuspěje-li, zvysi hodnotu citace cekajicich vlaken o jedna a pozada system o uspani.", "a": true}, {"ch": "VI. Synchronizace", "q": "Stav rekurzivniho mutexu lze realizovat jako dvojici (stav obycejného mutexu, pocitadio zanořeni).", "a": false}, {"ch": "VI. Synchronizace", "q": "Stav rekurzivniho mutexu Ize realizovat jako trojici (stav obycejného mutexu, identifikátor vlastnika, fronta čekajících vláken).", "a": false}, {"ch": "VI. Synchronizace", "q": "Stav rekurzivniho mutexu lze realizovat jako trojici (stav obycejného mutexu, identifikátor vlastnika, počitadlo zanořeni).", "a": true}, {"ch": "VI. Synchronizace", "q": "Pri žiadosti o odemčení rekurzívneho mutexu sa najprv zníži počítadlo zamknutia a skutočné odomknutie sa vykoná iba v prípade, keď toto došlo na nulu.", "a": true}, {"ch": "VI. Synchronizace", "q": "Aby byla kritická sekce S chráněna mutexem, musi stejna instance mutexu chránit zároven všechny běhy, vůči kterým je S kritickou sekci.", "a": true}, {"ch": "VI. Synchronizace", "q": "Synchronizační zařízení je periferie, která umožňuje omezit nežádoucí souběžnost v programech.", "a": false}, {"ch": "VI. Synchronizace", "q": "Synchronizační zařízení je datová struktura, ktere stav je uložen v paměti.", "a": true}, {"ch": "VI. Synchronizace", "q": "Synchronizační zařízení je fyzická adresa, která je namapovaná do dvou různých virtuálních adresních prostorů.", "a": false}, {"ch": "VI. Synchronizace", "q": "Spinlock je konkrétní implementace vzájemného vyloučení (mutexu).", "a": true}, {"ch": "VI. Synchronizace", "q": "Zarizeni vzájemného vyloučení (mutex) má operace čekání (wait) a signalizace (signal).", "a": false}, {"ch": "VI. Synchronizace", "q": "Zarizeni vzájemného vyloučení (mutex) má operace uzamčení (lock) a odemčení (unlock).", "a": true}, {"ch": "VI. Synchronizace", "q": "Vzájemné vyloučení řeši (mutex) problém kritické sekce.", "a": true}, {"ch": "VI. Synchronizace", "q": "Vzájemné vyloučení řeši (mutex) problém hladoveni.", "a": false}, {"ch": "VI. Synchronizace", "q": "Vzájemné vyloučení (mutex) řeší problém souběžné datove zavislosti.", "a": false}, {"ch": "VI. Synchronizace", "q": "Spinlock je idealni synchronizační zařízení pro použití v uživatelských podprogramech.", "a": false}, {"ch": "VI. Synchronizace", "q": "Spinlock ma univerzalni pouziti – lze jej efektivně využít vzdy, kdyz potrebujeme zabezpečit vzájemné vyloučení.", "a": false}, {"ch": "VI. Synchronizace", "q": "Abstraktní zařízení vzájemného vyloučení (mutex) má dva stavy: odemčeno a zamčeno.", "a": true}, k lze pouzit k reseni problemu kriticke sekci.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Uváznutí nemůže nastat, je-li zamezeno některé z těchto podmínek: kritická sekce, čekající vlastník, neodnímatelnost, kruhové čekání.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "Uváznutí nemůže nastat, je-li zamezeno některé z těchto podmínek: vzájemné vyloučení, čekající vlastník, neodnímatelnost, kruhové čekání.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Uváznutí lze detekovat například kontrolou kruhového čekání.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Uváznutí může nastat kdykoliv je splněna alespoň jedna z techto podminek: vzájemné vyloučení, čekající vlastník, neodnímatelnost, kruhové čekání.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "Uvaznuti nelze za žadnych okolnosti detekovat zcela spolehlivě.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "K detekci uvaznuti lze využít dynamicky graf závislostí zdrojů.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Každé uváznutí je důsledkem hazardu soubehu.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "Uváznutí muze, ale nemusi, byt důsledkem hazardu soubehu.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Odnímatelný zdroj je takovy, ktery lze jeho aktuálnímu vlastníkovi odebrat bez zásadního dopadu na jeho schopnost pokračovat.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Odnímatelný zdroj lze sice jeho aktualnimu vlastníkovi odebrat, ale vlastnika je protom nutne ukončit.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "Virtualizované zdroje jsou typicky neodnímatelné - dočasné odebrání fyzického zdroje... obvykle zabrání jejímu úspěšnému dokončení.", "a": false}, {"ch": "VII. Komunikace, uváznutí", "q": "Účastní-li se uvaznuti odnímatelný zdroj, muze se system pokusit z uvaznuti zotavit jeho odebiranim.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "V systemu předrezervací zdroju musi kazdy progr aktního zdroje může být i synchronizační zařízení, konkrétně třeba mutex.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Abstraktní zdroj je charakterizovan moznosti rezervaci a pozdejsiho uvolneni.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Každé komunikacni zarizeni je zaroven zarizenim synchronizačním.", "a": true}, {"ch": "VII. Komunikace, uváznutí", "q": "Každé synchronizační zařízení je zaroven zarizenim komunikačním.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha druhé úrovně je procesorem spuštěna v právě aktivnim procesu, proto musi byt data, která obsluha potřebuje, dostupná ve všech virtuálních adresnich prostorech.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha první úrovně je spuštěna v právě aktivnim procesu, proto musi byt data, která obsluha potrebuje, dostupná ve všech virtuálních adresních prostorech.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizovat periferii a software.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Přerušení je realizováno preemptivně - právě vykonávané uživatelské vlákno je pozastaveno a je spuštěna obsluha přerušení.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Preruseni je realizováno kooperativně - operační systém pravidelne kontroluje, nedošlo-li k nějakému přerušení.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení může být souběžná s obsluhou další aktivace téhož přerušení.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušeni nesmí být souběžná s obsluhou jiných přerušení.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení může být souběžná s obsluhou jiných přerušení.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení nesmi byt souběžná s obsluhou dalsi aktivace téhož přerušeni.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Spinlock nelze v obsluze preruseni bezpečne použit za žádnych okolnosti.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení je realizovaná specialnim podprogramem, ktery je aktivován na zásobníku vlákna, které v době přerušení běželo.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení je realizovaná specialnim podprogramem, ktereho adresa je uvedena v tabulce obsluhy přerušení.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Při aktivaci obsluhy přerušení dojde automaticky k přepnutí virtuálního adresního prostoru.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Při aktivaci obsluhy přerušení obvykle dojde také k prepnuti aktivniho zasobniku.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "S možností aktivace obsluhy přerušení je nutné počítat kdykoliv - aktivaci není možné zakázat ani odložit.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Dané přerušení lze dočasně zakázat, čím se jeho obsluha odsune do chvíle, než je opět povoleno.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha preruseni je realizována vláknem, které bylo v době přerušení aktivni.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha preruseni je souběžná se všemi uživatelskými vlákny.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Obslužný podprogram přerušení může využívat základní výpočetní zdroje - zejména má k dispozici registry a zásobník.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Obslužný podprogram přerušení pracuje v omezeném režimu - zejména nesmí při svém výpočtu využívat zásobník.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obslužný podprogram přerušení je spuštěn v uzivatelskem rezimu procesoru.", "a": false}, {"ch": "VIII. Přerušení a periferie", "q": "Obsluha přerušení je souběžná s vykonáváním kódu jádra operačního systému na jiných procesorových jádrech.", "a": true}, {"ch": "VIII. Přerušení a periferie", "q": "Použití spinlocku v obsluze přerušení j ogramu využívat sluzby jadra.", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Při systémovém volání dojde k přepnutí procesoru do privilegovaného režimu.", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Systémové volání přepne procesor do privilegovaného rezimu a pokracuje ve vykonavani programu.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádro je jádro, které je zabudované přímo v mikrokódu procesoru.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádro je jádro určené pro provoz na mikrokontroléru.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádro musí být menší než 32 KiB.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádro poskytuje pouze nezbytné minimum služeb.", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádro zpravidla obsahuje implementaci alespoň jednoho souboroveho systému.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojádra se pouzivaji v operacnich systemech urcenych pro osmibitove pocitace.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojadro vyčleňuje vetsinu funkcionality mimo jadro samotne.", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Mikrojadro je libovolne jadro, ktere obsahuje pouze ovladace potrebne pro instalovany hardware.", "a": false}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Cílem mikrojádra je minimalizovat množství kodu provadeneho v privilegovaném režimu.", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Většina procesorů má minimálně 2 rezimy: uzivatelsky (pro běžné programy) a privilegovany (pro jádro).", "a": true}, {"ch": "IX. Jádro, hypervizor (a XII. OS Virtualization)", "q": "Běžné procesory mají minimálně 2 režimy let questions = [...ALL_QUESTIONS];
let answers = {};
let current = 0;
let filter = 'all';
let activeChapter = 'all';

function getChapterQuestions(ch) {
  return ch === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.ch === ch);
}

function onChapterChange() {
  const sel = document.getElementById('chapterSelect').value;
  activeChapter = sel;
  questions = getChapterQuestions(sel);
  answers = {};
  current = 0;
  filter = 'all';
  render();
}

function goToQuestion() {
  const input = document.getElementById('searchInput');
  const errEl = document.getElementById('searchErr');
  const val = parseInt(input.value);
  const total = ALL_QUESTIONS.length;

  if (isNaN(val) || val < 1 || val > total) {
    errEl.textContent = `Zadaj číslo od 1 do ${total}`;
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  // Switch to all chapters if needed
  const targetQ = ALL_QUESTIONS[val - 1];
  if (activeChapter !== 'all' && targetQ.ch !== activeChapter) {
    activeChapter = 'all';
    document.getElementById('chapterSelect').value = 'all';
    questions = [...ALL_QUESTIONS];
    answers = {};
  }
  filter = 'all';
  current = questions.indexOf(targetQ);
  input.value = '';
  render();
}

function filtered() {
  if (filter === 'all') return questions;
  if (filter === 'unanswered') return questions.filter((q) => answers[questions.indexOf(q)] === undefined);
  if (filter === 'wrong') return questions.filter((q) => {
    const gi = questions.indexOf(q);
    return answers[gi] !== undefined && answers[gi] !== q.a;
  });
  return questions;
}

function render() {
  const app = document.getElementById('app');
  const total = questions.length;
  const correct = questions.filter((q,i) => answers[i] === q.a).length;
  const wrong = questions.filter((q,i) => answers[i] !== undefined && answers[i] !== q.a).length;
  const answered = Object.keys(answers).length;
  const remaining = total - answered;

  if (answered === total && filter === 'all') {
    const pct = Math.round(correct / total * 100);
    app.innerHTML = `<div class="end">
      <div class="end-score" style="color:${pct>=70?'#2a7a4f':'#c0392b'}">${pct}%</div>
      <div class="end-sub">${correct} z ${total} správne &nbsp;·&nbsp; ${wrong} chybne</div>
      <button class="ctrl-btn primary" onclick="restart()">Zopakovať od začiatku</button>
      <button class="ctrl-btn" style="margin-left:8px" onclick="showWrong()">Pozrieť chybné (${wrong})</button>
    </div>`;
    return;
  }

  const qs = filtered();
  if (qs.length === 0) {
    app.innerHTML = `<div style="text-align:center;padding:2rem"><p>Žiadne otázky vo filtri.</p><button class="ctrl-btn" onclick="setFilter('all')">Zobraziť všetky</button></div>`;
    return;
  }
  const di = Math.min(current, qs.length - 1);
  const q = qs[di];
  const gi = questions.indexOf(q);
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  const ua = answers[gi];
  const revealed = ua !== undefined;

  let tClass = 'btn-tf', fClass = 'btn-tf';
  if (revealed) {
    if (ua === true)  tClass += q.a === true  ? ' bt-correct' : ' bt-wrong';
    if (ua === false) fClass += q.a === false ? ' bt-correct' : ' bt-wrong';
  }

  const fb = revealed ? `<div class="feedback ${ua===q.a?'fb-ok':'fb-no'}">
    ${ua===q.a ? '✓ Správne' : '✗ Nesprávne — správna odpoveď: <strong>'+(q.a?'PRAVDA':'NEPRAVDA')+'</strong>'}
  </div>` : '';

  app.innerHTML = `
    <div class="progress-outer"><div class="progress-inner" style="width:${Math.round(answered/total*100)}%"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-n n-c">${correct}</div><div class="stat-l">Správne</div></div>
      <div class="stat"><div class="stat-n n-w">${wrong}</div><div class="stat-l">Chybne</div></div>
      <div class="stat"><div class="stat-n n-r">${remaining}</div><div class="stat-l">Zostáva</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">Všetky (${total})</button>
      <button class="filter-btn ${filter==='unanswered'?'active':''}" onclick="setFilter('unanswered')">Nezodpovedané (${remaining})</button>
      <button class="filter-btn ${filter==='wrong'?'active':''}" onclick="setFilter('wrong')">Chybné (${wrong})</button>
    </div>
    <div class="q-num">${di+1} / ${qs.length}${filter!=='all'?' (filtrované)':''} &nbsp;·&nbsp; <span style="color:#aaa">globálne #${globalIdx+1}</span></div>
    <div class="card">
      <div class="ch-label">${q.ch}</div>
      <div class="q-text">${q.q}</div>
      <div class="btn-row">
        <button class="${tClass}" onclick="answer(${gi},true)" ${revealed?'disabled':''}>PRAVDA</button>
        <button class="${fClass}" onclick="answer(${gi},false)" ${revealed?'disabled':''}>NEPRAVDA</button>
      </div>
      ${fb}
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prev()" ${di===0?'disabled':''}>← Späť</button>
      <button class="ctrl-btn primary" onclick="next()" ${di>=qs.length-1?'disabled':''}>Ďalej →</button>
      <button class="ctrl-btn" style="margin-left:auto" onclick="shuffle()">🔀 Zamiešať</button>
    </div>
  `;
}

function answer(gi, val) { answers[gi] = val; render(); }
function next() { const qs = filtered(); if (current < qs.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function setFilter(f) { filter = f; current = 0; render(); }
function showWrong() { filter = 'wrong'; current = 0; render(); }
function shuffle() {
  for (let i = questions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  answers = {}; current = 0; render();
}
function restart() {
  questions = getChapterQuestions(activeChapter);
  answers = {}; current = 0; filter = 'all'; render();
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  const qs = filtered();
  const q = qs[Math.min(current, qs.length-1)];
  const gi = questions.indexOf(q);
  if ((e.key==='p'||e.key==='P'||e.key==='1') && answers[gi]===undefined) answer(gi, true);
  if ((e.key==='n'||e.key==='N'||e.key==='2') && answers[gi]===undefined) answer(gi, false);
});

render();
</script>
