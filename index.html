<script>
const ALL_QUESTIONS = [{"ch": "Virtualizace procesoru", "q": "Odebírání procesoru běžícímu vláknu je realizováno napojením plánovače na obsluhu přerušení časovače. Frekvence tohoto časovače rozhoduje mimo jiné o kompromisu mezi latencí (reakční dobou) a propustností systému: vyšší frekvence znamená vyšší latenci (delší reakční dobu), ale je spojená s nižší režií (obsluha přerušení zabere v úhrnu méně procesorového času).", "a": false, "exp": "Tvrdenie je nepravdivé v časti o vzťahu frekvencie a latencie. Vyššia frekvencia časovača znamená NIŽŠIU latenciu (kratšiu reakčnú dobu) — vlákno čaká kratšie, kým ho plánovač znova naplánuje. Správne je, že vyššia frekvencia zvyšuje réžiu (obsluha prerušenia zaberá viac celkového času CPU)."}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší a procesor uvolní pro běh jiného vlákna, a to kdykoliv v průběhu výpočtu.", "a": true, "exp": "Tvrdenie je pravdivé. Preemptívne plánovanie je práve definované tým, že vlákna nemusia aktívne uvoľňovať procesor — plánovač ich môže prerušiť kedykoľvek (napr. pri prerušení od časovača) a odovzdať CPU inému vláknu. Každé vlákno tak môže predstierať, že má procesor len pre seba."}, {"ch": "Virtualizace procesoru", "q": "Afinitou označujeme snahu plánovače omezit přesuny vláken mezi různými procesorovými jádry. Plánovače mohou mít různou úroveň afinity – od takových, které vůbec afinitu neznají, přes kompromisní návrhy, které vlákna přesouvají za určitých okolností (zejména je-li zátěž jednotlivých procesorů příliš nevyvážená), až k plánovačům, které vlákna mezi procesory nepřesouvají vůbec.", "a": true, "exp": "Tvrdenie je pravdivé. Afinita plánovača skutočne opisuje snahu obmedziť presúvanie vlákien medzi jadrami, pretože presun je drahý (studená cache). Plánovače sa líšia mierou afinity — od nulovej po pevné priradenie vlákna k jadru."}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc, než administrátor na témže počítači. Tento problém se obvykle řeší tím, že administrátor nastaví každému uživateli maximální počet procesů a vláken, které mohou současně běžet.", "a": false, "exp": "Tvrdenie je nepravdivé. Problém spravodlivého rozdeľovania času sa nerieši limitom počtu procesov/vlákien na používateľa. Rieši sa mechanizmami ako skupiny plánovania (cgroups) alebo fair-share scheduling, kde každý používateľ dostane zodpovedajúci podiel CPU bez ohľadu na počet vlákien."}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li k aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken, které spočívá v přepsání stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového vlákna.", "a": false, "exp": "Tvrdenie je nepravdivé. Prepínanie vlákien (context switch) NEspočíva v prepísaní stránkovacích tabuliek — to je drahé a robí sa len pri prepnutí medzi procesmi. Pri prepnutí vlákien v rámci jedného procesu zostávajú stránkovacie tabuľky rovnaké; prepínajú sa len registre CPU (PC, SP, GPR)."}, {"ch": "Souborové systémy", "q": "RAID (Redundant Array of Inexpensive Disks) je technologie, která sdružuje několik disků do jednoho virtuálního blokového zařízení, zejména za účelem zlepšení spolehlivosti. RAID může být realizován jak hardwarově tak i softwarově – v tom druhém případě je implementace součástí blokové vrstvy operačního systému. Softwarový RAID nicméně vyžaduje navíc speciální podporu v souborovém systému.", "a": false, "exp": "Tvrdenie je nepravdivé. Softwarový RAID nevyžaduje žiadnu špeciálnu podporu v súborovom systéme — je implementovaný v blokovej vrstve OS a súborový systém ho vníma len ako bežné blokové zariadenie. Súborový systém nepotrebuje vedieť, že pod ním beží RAID."}, {"ch": "Souborové systémy", "q": "Souborový systém poskytuje aplikacím a uživatelům velmi užitečnou abstrakci: samotné zařízení, které data ukládá, nemá prakticky žádnou strukturu, je to de facto pouze pole datových bloků. Ukládání dat do jednoho společného pole různými aplikacemi a různými uživateli není příliš praktické. Souborový systém naopak poskytuje bohatou strukturu: data lze organizovat do souborů a adresářů, data v jednotlivých souborech jsou od sebe oddělená, soubory mohou nezávisle na sobě měnit velikost, atd.", "a": true, "exp": "Tvrdenie je pravdivé. Blokové zariadenie (disk) poskytuje len holé pole blokov bez štruktúry. Súborový systém nad tým pridáva hierarchiu adresárov, izoláciu súborov, dynamickú zmenu veľkosti a ďalšie abstrakcie."}, {"ch": "Souborové systémy", "q": "Souborový systém je organizován do stromové (adresářové) struktury. (Absolutní) cestou rozumíme textový popis pozice uzlu (souboru nebo adresáře) v tomto stromě: skládá se z názvů jednotlivých adresářů, podřízených název cílového objektu. Cesta je obvyklý způsob, jak operačnímu systému předat informaci, se kterým souborem nebo adresářem chceme pracovat.", "a": true, "exp": "Tvrdenie je pravdivé. Absolútna cesta popisuje pozíciu v strome adresárov — skladá sa z názvov adresárov oddelených lomítkom, od koreňa až po cieľový súbor alebo adresár. Je to štandardný spôsob identifikácie súboru v systéme."}, {"ch": "Souborové systémy", "q": "Vyrovnávací paměť uchovává požadavky na zápis, které dosud nebyly plně vyřízeny, mimo jiné proto, aby aplikace nemusela při každém zápisu čekat na jeho zdlouhavé dokončení. Tato vyrovnávací paměť může být propojená s mezipamětí nebo oddělená. V tom druhém případě je od mezipaměti zcela nezávislá. Výhodou tohoto návrhu je větší propustnost zápisů.", "a": false, "exp": "Tvrdenie je nepravdivé. Zavádzajúce je tvrdenie, že oddelená vyrovnávacia pamäť má 'väčšiu priepustnosť zápisov' — priepustnosť závisí od konkrétnej implementácie a stratégie (write-back vs write-through), nie od toho, či je cache oddelená od medzipamäte."}, {"ch": "Souborové systémy", "q": "Tradičně používají aplikace pro přístup k datům uloženým v souborech systémové služby read a write (nebo ekvivalentní). Nejedná se ale o jedinou možnost (a v mnoha případech ani o možnost nejefektivnější): aplikace si může vyžádat, aby jí operační systém namapoval obsah souboru do virtuálního adresního prostoru. S obsahem souboru pak lze pracovat prostřednictvím tzv. DMA [direct memory access].", "a": false, "exp": "Tvrdenie je nepravdivé. Alternatívou k read/write je memory-mapped I/O (mmap), ktoré mapuje obsah súboru do virtuálneho adresného priestoru procesu — nie DMA. DMA je hardvérový mechanizmus zariadení na priamy prístup do pamäte; aplikácie ho nepoužívajú priamo na čítanie súborov."}, {"ch": "Periferie", "q": "Často je nežádoucí, aby periferie, která používá pro přenos dat přímý přístup do paměti (DMA) mohla data zapisovat na libovolné adresy. Taková periferie by totiž mohla ohrozit integritu operačního systému, např. tím, že by přepsala část kódu jádra. Proto se pro DMA používají virtuální adresy, a ve stránkových tabulkách každého procesu je poznačeno, kterým periferiím je daná stránka přístupná. O vynucení těchto omezení se stará jednotka správy paměti (MMU).", "a": false, "exp": "Tvrdenie je nepravdivé. DMA používa FYZICKÉ adresy, nie virtuálne. Ochrana pred neoprávneným zápisom zariadení sa rieši cez IOMMU (I/O Memory Management Unit), nie cez bežné stránkovacie tabuľky procesov."}, {"ch": "Periferie", "q": "V moderních systémech se často pro komunikaci mezi hardwarem a softwarem používá přímý přístup do paměti (DMA). V tomto režimu může hardwarové zařízení přímo přistupovat do operační paměti. Procesor a zařízení se přitom ale musí synchronizovat: každý DMA přenos tedy musí začínat a končit přerušením, které operačnímu systému oznámí, že nesmí (resp. opět může) používat instrukce přístupu do paměti.", "a": false, "exp": "Tvrdenie je nepravdivé. DMA prenosy nemusia každý začínať a končiť prerušením — zariadenie si samo zapisuje/číta pamäť a prerušením iba signalizuje dokončenie celého prenosu. Počas DMA prenosu môže CPU normálne vykonávať inštrukcie vrátane prístupu do pamäte."}, {"ch": "Periferie", "q": "Úkolem sběrnice je jednak přenos dat a signalizace událostí, jednak konfigurace a enumerace připojených periferií. Enumerací sběrnice rozumíme vyjmenování všech připojených periferií a jejich identifikátorů, na základě kterých operační systém zjistí, o jaké přesně zařízení se jedná a díky tomu může zavést a inicializovat potřebný ovladač.", "a": true, "exp": "Tvrdenie je pravdivé. Enumerácia zbernice (napr. PCIe) znamená vymenovanie všetkých pripojených zariadení a zistenie ich identifikátorov (Vendor ID, Device ID), na základe čoho OS zavedie správny ovládač."}, {"ch": "Periferie", "q": "Síťové rozhraní je zařízení, které zejména přesouvá data mezi sítí a operační pamětí. Krom základního nastavení se tedy ovladač stará hlavně o přenos dat. K tomu slouží fronty, které jsou uloženy v operační paměti, a ke kterým síťový hardware přistupuje přímo, (t.j. použitím DMA). Ukazatele do těchto front jsou uloženy v registrech rozhraní.", "a": true, "exp": "Tvrdenie je pravdivé. Sieťové rozhranie používa DMA fronty (descriptor rings) v operačnej pamäti pre príjem aj odosielanie paketov. Ukazovatele (head/tail pointery) do týchto frontov sú uložené v registroch sieťovej karty."}, {"ch": "Periferie", "q": "Ovladač je program, často součást jádra, který zprostředkovává komunikaci mezi hardwarem a ostatním softwarem. Ovladače jsou typicky vázané na konkrétní hardwarové zařízení, ale beze změn přenositelné mezi operačními systémy. Na softwarové straně poskytují ovladače (alespoň částečně) sjednocené rozhraní: různé pevné disky jsou například díky ovladačům pro zbytek systému téměř záměnné, podobně třeba síťová rozhraní.", "a": false, "exp": "Tvrdenie je nepravdivé. Ovládače sú typicky závislé na konkrétnom operačnom systéme, NIE len na hardvéri. Ovládač pre Linux napísaný pre konkrétnu kartu nebude fungovať bez úprav na Windows — prenositeľnosť medzi OS je výnimkou, nie pravidlom."}, {"ch": "Súbežnosť a synchronizácia", "q": "„Producenti a konzumenti“ jsou klasickým problémem souběžnosti, ve kterém vystupují dva typy vláken. První typ vlákna (producent) generuje výsledky, které jsou určeny k dalšímu zpracování druhým typem vlákna (konzument). Protože konzumenti jsou s producenty vzájemně souběžní, může nastat situace, kdy nejsou k dispozici žádné mezivýsledky ke zpracování – v takovém případě je potřeba, aby konzumenti vyčkali na producenty (synchronizovali se s nimi). Opačná situace, kdy producenti vytváří výsledky příliš rychle, nastat nemůže, protože by vedla k zahlcení veškeré dostupné paměti.", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnom tvrdení. Situácia, kedy producenti produkujú príliš rýchlo, môže a nastáva — rieši sa obmedzenou (bounded) frontou. Keď je fronta plná, producent sa zablokuje a čaká, kým konzument neuvoľní miesto."}, {"ch": "Súbežnosť a synchronizácia", "q": "Akce považujeme za souběžné, je-li souběžná libovolná dvojice událostí, která s těmito akcemi souvisí. Souběžné akce mohou být nezávislé (cílové události obou akcí jsou různé), nebo tvoří synchronizaci (akce mají společnou cílovou událost). Akce, které tvoří synchronizaci, musí proběhnout najednou – je to přímý důsledek toho, že vedou do stejné události. Synchronizaci lze využít například pro řešení problému kritické sekce.", "a": false, "exp": "Tvrdenie je nepravdivé. Súbežné akcie nemusia mať 'spoločnú cieľovú udalosť' — súbežné znamená, že medzi nimi neexistuje vzťah predchádzania. Synchronizácia je len jeden konkrétny prípad súbežnosti (kde sa vlákna stretávajú v spoločnej udalosti), nie jej definícia."}, {"ch": "Súbežnosť a synchronizácia", "q": "O dvou různých událostech A a B musí platit právě jedna ze tří možností – 1) A předchází B; 2) B předchází A; 3) A nepředchází B a zároveň B nepředchází A. Poslední uváděná možnost odpovídá situaci, kdy jsou události souběžné, ale ani v jednom z těchto případů není určeno pevné pořadí událostí v čase – mluvíme pouze o jejich kauzální souvislosti.", "a": false, "exp": "Tvrdenie je nepravdivé. Relácia predchádzania je čiastočné (nie úplné) usporiadanie — medzi dvoma udalosťami nemusí platiť ani jeden smer. Tretia možnosť (ani A nepredchádza B, ani B nepredchádza A) je práve definícia súbežnosti udalostí."}, {"ch": "Súbežnosť a synchronizácia", "q": "Relace předcházení je abstrakce, která nám umožní skrývat detaily procesů (dějů), které nemají pevně určené pořadí kroků v čase. Popíšeme-li vnější chování takového procesu (děje) relací předcházení P, může dojít ke konfliktu, kdy některé časové sledy kompatibilní s P vedou na vnější chování A a jiné časové sledy, které jsou také s P kompatibilní, vedou na odlišné vnější chování B. Této situaci říkáme hazard souběžnosti.", "a": true, "exp": "Tvrdenie je pravdivé. Hazard súbežnosti nastáva, keď rôzne časové priebehy kompatibilné s reláciou predchádzania vedú na rôzne vonkajšie správanie. Je to kľúčový problém súbežného programovania — program sa správa nedeterministicky."}, {"ch": "Súbežnosť a synchronizácia", "q": "Souběžná datová závislost je typ hazardu souběžnosti, při kterém vlákno A zapisuje do paměťové buňky, vlákno B z téže buňky čte, akce čtení a zápisu jsou souběžné a zároveň další chování vlákna B závisí na přečtené hodnotě. Existují pak konzistentní časové sledy, kdy čtení předběhne zápis, přečte nesprávnou hodnotu a celkový výsledek je tedy také nesprávný. Tato chyba se sice neprojevuje při každém spuštění, protože problémové akce jsou souběžné, správný a špatný výsledek budeme dostávat přibližně rovnako často.", "a": true, "exp": "Tvrdenie je pravdivé. Súbežná dátová závislosť (data race) je definovaná súbežným zápisom a čítaním tej istej pamäťovej bunky, kde výsledok závisí od poradia. Chyba sa neprejavuje vždy — závisí od aktuálneho načasovania vlákien."}, {"ch": "Mutexy", "q": "Rychlý mutex je konkrétní implementace mutexu, která vyžaduje součinnost operačního systému, aby mohla být čekající vlákna uspána a nemusela tak aktivně čekat. Zároveň ale minimalizuje případy, kdy je interakce s operačním systémem nutná, protože taková interakce je relativně drahá. Uživatelská část stavu je tvořena jediným bitem (podobně jako u spinlocku), zatímco operační systém udržuje počítadlo vláken, která čekají na odemčení.", "a": false, "exp": "Tvrdenie je nepravdivé. Používateľská časť stavu futexu (rýchly mutex) nie je len jeden bit — typicky je to 32-bitový integer, kde rôzne hodnoty rozlišujú stavy (odomknutý, zamknutý bez čakajúcich, zamknutý s čakajúcimi). OS si navyše neudržiava počítadlo čakajúcich separátne — je zakódované v samotnej hodnote futexu."}, {"ch": "Mutexy", "q": "Spinlock je konkrétní implementace mutexu. Jeho konkrétní stavy přesně korespondují s těmi abstraktními definovanými mutexem. Lze je tedy zakódovat do jediného bitu (nicméně v paměti se obvykle pro spinlock použije alespoň jeden bajt). Při implementaci spinlocku je nutné věnovat pozornost operaci zamčení, která při naivní implementaci operacemi load a store nebude fungovat správně – proto se obvykle v implementaci využívá atomických instrukcí, např. instrukce „compare and exchange“ (cmpxchg).", "a": true, "exp": "Tvrdenie je pravdivé. Spinlock má dva stavy zakódovateľné do jedného bitu. Naivná implementácia cez load+store nefunguje kvôli race condition medzi čítaním a zápisom, preto sa používajú atómové inštrukcie ako cmpxchg (compare-and-exchange)."}, {"ch": "Mutexy", "q": "Synchronizační zařízení představuje způsob, jak omezit nežádoucí souběžnost. Různá synchronizační zařízení jsou vhodná k řešení různých problémů souběžnosti, mají ale několik společných vlastností. Asi nejdůležitější z nich je, že mají nějaký stav, který se může samovolně měnit.", "a": false, "exp": "Tvrdenie je nepravdivé v poslednej časti. Stav synchronizačného zariadenia sa NEzmení samovoľne — mení ho vždy nejaké vlákno alebo hardvér. Definičnou vlastnosťou je práve riadená (nie samovoľná) zmena stavu."}, {"ch": "Mutexy", "q": "Mutex (zařízení pro vzájemné vyloučení) je abstraktní synchronizační zařízení, které má dva stavy - odemčen a uzamčen - a dvě operace - odemčení a zamčení. Odemčení je povoleno jen ve stavu uzamčen, zatímco operace zamčení je povolena kdykoliv, ale je-li mutex ve stavu zamčen, tato operace vyčká, než současný vlastník mutex odemkne. Základním použitím mutexu je ochrana kritické sekce.", "a": true, "exp": "Tvrdenie je pravdivé. Mutex má presne dva stavy (zamknutý/odomknutý) a dve operácie. Operácia zamknutia blokuje, ak je mutex už zamknutý, a čaká na odomknutie. Toto je základ pre ochranu kritických sekcií."}, {"ch": "Mutexy", "q": "Monitor je jednoduchou ale velmi užitečnou abstrakcí – uvažme datovou strukturu, která sestává z nějaké datové reprezentace a operací nad ní. Realizace jednotlivé operace je často kritickou sekcí vůči ostatním operacím (to platí zejména pro ty operace, které strukturu mění) a proto musí být odpovídajícím způsobem chráněna. Princip monitoru spočívá v tom, že každé instanci takové datové struktury přidružíme jeden mutex, a každá operace (realizovaná podprogramem) na svém začátku mutex zamkne a před svým koncem opět odemkne. Takto implementované zamykání je bezpečné i optimální (přidává do programu pouze nezbytně nutné minimum synchronizace).", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnom hodnotení. Monitor nie je 'optimálny' v tom zmysle, že by pridával len nezbytné minimum synchronizácie — zamyká mutex pre každú operáciu vrátane tých, ktoré by mohli byť súbežné (napr. viaceré čítania). Optimálnejšie prístupy (napr. reader-writer lock) umožňujú väčšiu súbežnosť."}, {"ch": "Komunikace a uváznutí", "q": "Úkolem zprostředkovatele v systému předávání zpráv je převzít zprávu od odesílatele a dodat ji adresátovi. K tomu musí mít k dispozici nějaký stávající komunikační kanál, kterým zprávu fyzicky doručí – může se jednat např. o sdílenou paměť, síťové spojení atp. Každý systém předávání zpráv má alespoň jednoho zprostředkovatele, ale některé jich můžou mít i několik.", "a": false, "exp": "Tvrdenie je nepravdivé. Sprostredkovateľ nemusí byť viazaný na 'existujúci komunikačný kanál' — môže kanál sám vytvoriť. Navyše nie každý systém odovzdávania správ potrebuje sprostredkovateľa — priame odovzdávanie správ (napr. v Erlangu alebo cez Unix pipes) funguje bez neho."}, {"ch": "Komunikace a uváznutí", "q": "Kruhová fronta je konkrétní implementace komunikační fronty, kterou lze implementovat bez použití vzájemného vyloučení (zámku). Sestává z pevně velkého pole hodnot a dvou ukazatelů, jednoho určeného pro čtení (R) a jednoho pro zápis (W). Vlákno, které prvky vkládá mění ukazatel W a ukazatel R pouze čte, a naopak, vlákno které prvky odebírá mění ukazatel R a ukazatel W pouze čte. Díky tomu je možné prvky do fronty vkládat souběžně s odebíráním nějakých jiných.", "a": true, "exp": "Tvrdenie je pravdivé. Kruhová fronta s jedným producentom a jedným konzumentom nepotrebuje zámok — producent mení len W, konzument len R, a tieto operácie sú navzájom nezávislé. Platí však len pre single-producer single-consumer scenár."}, {"ch": "Komunikace a uváznutí", "q": "Ke komunikaci lze teoreticky použít libovolnou datovou strukturu chráněnou vhodným synchronizačním zařízením, např. mutexem nebo monitorem. Problém tohoto uspořádání je soutěž [contention] o příslušný zámek – z takto chráněné datové struktury není možné zároveň číst (nebo z ní dokonce odebírat prvky) a zároveň do ní zapisovat (přidávat prvky). Proto je tento typ struktury pro komunikaci v praxi zcela nevhodný – je nutné použít specializované komunikační zařízení.", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnom závere. Dátová štruktúra chránená mutexom je pre komunikáciu bežne použiteľná (napr. thread-safe queue). Contention existuje, ale nevylučuje použiteľnosť — tvrdenie, že je 'zcela nevhodný', je príliš silné."}, {"ch": "Komunikace a uváznutí", "q": "Komunikace mezi souběžnými entitami (např. vlákny) je vždy zároveň formou synchronizace – je-li přečtena nějaká hodnota, kterou předtím někdo zapsal, odpovídající události musí být relací předcházení uspořádané, přitom akce zápisu a čtení musí být souběžné. Do události „přečteno“ tedy přichází souběžné akce, což je definiční vlastnost synchronizace.", "a": false, "exp": "Tvrdenie je nepravdivé. Komunikácia nie je vždy synchronizácia. Pri asynchrónnej komunikácii (fire-and-forget) producent zapíše správu a pokračuje bez čakania — akcie nie sú zviazané spoločnou udalosťou a teda nejde o synchronizáciu."}, {"ch": "Komunikace a uváznutí", "q": "Rezervace je alternativou k virtualizaci, ale není s ní vzájemně výlučná – lze si např. představit, že aplikace si může rezervovat nějakou zaručenou kapacitu jinak virtualizovaného zdroje. Takto rezervovaná kapacita musí po dobu platnosti rezervace ze systému virtualizace vyloučena (tzn. nesmí být sdílená s jinou entitou, např. procesem). U virtualizovaných zdrojů navíc rezervace nemůže selhat – takového zdroje je k dispozici libovolné množství.", "a": true, "exp": "Tvrdenie je nepravdivé v záverečnej časti. Rezervácia virtualizovaného zdroja môže zlyhať, ak nie je dostatok voľnej kapacity — zdroje sú obmedzené aj pri virtualizácii. Tvrdenie, že 'rezervácia nemôže selhat', platí len pre neobmedzene virtualizované zdroje."}, {"ch": "Prerušenie a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizaci periferií a softwaru, přitom z čistě softwarových synchronizačních zařízení se nejvíce podobá podmínkové proměnné. Důležitým rozdílem oproti softwarovým synchronizačním zařízením je, že přerušení je asymetrické: signalizovat jej může pouze periferie a reagovat na něj může pouze software (není tedy možné přerušením vyžádat pozornost periferie).", "a": true, "exp": "Tvrdenie je pravdivé. Prerušenie je asymetrické synchronizačné zariadenie — periféria signalizuje, software reaguje. Podobá sa podmienkovej premennej (condition variable), kde jedna strana signalizuje a druhá čaká, ale s pevne danými rolami."}, {"ch": "Prerušenie a periferie", "q": "Ve chvíli, kdy přerušení nastane, může procesor právě vykonávat nějakou jinou činnost. Až na situace, kdy je přerušení krátkodobě explicitně zakázáno, procesor tuto činnost přeruší, uloží kontext, který bude nutný pro pokračování v takto přerušené činnosti a spustí obsluhu přerušení. Obslužný podprogram je spuštěn ve stejném režimu, v jakém byl procesor ve chvíli, kdy k přerušení došlo, přesto ale považujeme obsluhu přerušení za součást jádra.", "a": false, "exp": "Tvrdenie je nepravdivé. Obslužný program prerušenia sa spúšťa v PRIVILEGOVANOM (kernel) režime, nie v režime, v ktorom bol procesor v čase prerušenia. Aj keď prerušenie nastane počas behu užívateľského kódu, CPU automaticky prepne do kernel módu."}, {"ch": "Prerušenie a periferie", "q": "Obsluha přerušení je obvykle časově kritickou operací, a to hned z několika důvodů: vlákno, které bylo přerušeno, je zablokováno až do doby než je obsluha přerušení ukončena, během obsluhy přerušení jsou zpravidla další přerušení blokována, atp. Proto je žádoucí veškerou práci, kterou není nutné provést přímo v obsluze přerušení, odložit na později. Časově nekritické části obsluhy přerušení jsou tedy naplánovány na pozdější spuštění v méně omezeném kontextu.", "a": true, "exp": "Tvrdenie je pravdivé. Obsluha prerušenia je časovo kritická — blokuje prerušené vlákno a typicky zakazuje ďalšie prerušenia. Preto sa ťažká práca odkladá do 'bottom half' mechanizmov (softirq, tasklet, workqueue v Linuxe), ktoré bežia neskôr v menej obmedzenom kontexte."}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J, protože že J je kritickou sekcí vůči I. Přitom nemůžeme zaručit, že bude-li J v době přerušení běžet, bude to na procesoru C. V této situaci je bezpečné použít k synchronizaci dočasný zákaz přerušení.", "a": false, "exp": "Tvrdenie je nepravdivé. Dočasný zákaz prerušenia funguje len na lokálnom jadre — na multiprocesorovom systéme môže vlákno J bežať na inom jadre a prerušenie I naň nemá vplyv. Zákaz prerušenia na jednom jadre neochráni kritickú sekciu bežiacu na inom jadre."}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze – periferie místo toho signalizuje dokončení přenosu přerušením. Protože operační paměti je k dispozici velké množství, není tento typ přerušení příliš citlivý na rychlost reakce operačního systému.", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnom tvrdení. DMA prerušenia sú naopak citlivé na latenciu — ak OS nezareaguje včas a nepripraví ďalší buffer, zariadenie môže stratiť dáta. Tvrdenie o 'veľkom množstve pamäte' nesúvisí s citlivosťou na rýchlosť reakcie."}, {"ch": "Jadro a hypervizor", "q": "Virtualizace umožňuje provoz více operačních systémů na jednom fyzickém počítači. Typická současná realizace je postavená nad hypervizorem a využívá virtualizačních rozšíření procesoru. Virtualizační počítače tak mají oproti těm fyzickým jen minimální dodatečnou režii. Hlavní motivací pro virtualizaci je lepší využití hardwaru a zlepšení izolace mezi jednotlivými službami, které daný fyzický počítač poskytuje. Významným faktorem je ale i zjednodušená administrace virtuálních počítačů oproti fyzickým.", "a": true, "exp": "Tvrdenie je pravdivé. Moderná hardvérová virtualizácia (Intel VT-x, AMD-V) minimalizuje réžiu tým, že hypervizor zasahuje len pri privilegovaných operáciách. Motivácie sú správne: lepšie využitie HW, izolácia služieb a jednoduchšia správa (snapshoty, migrácia, zálohy)."}, {"ch": "Jadro a hypervizor", "q": "Schopnost operačního systému vynucovat přístupová práva je ukotvena v ochraně paměti implementované procesorem. Protože přímý přístup k paměti má pouze jádro, může rozhodovat o tom, které požadavky na přístup povolí a které nikoliv. Potřebuje-li proces přistupovat k nějakému místu (adrese) v paměti, musí použít systémové volání, čím jádru umožní provést kontrolu práv.", "a": false, "exp": "Tvrdenie je nepravdivé. Procesy pristupujú k pamäti priamo cez MMU bez zásahu jadra — bežné čítanie/zápis prebieha bez systémového volania. Jadro nastavuje stránkovacie tabuľky, ale samotnú kontrolu prístupových práv vykonáva MMU hardvérovo pri každom prístupe."}, {"ch": "Jadro a hypervizor", "q": "Jádro je v běžném operačním systému jediná komponenta, která běží v privilegovaném režimu. Proto má na starost zejména úkoly, které lze provádět pouze v tomto režimu, například nastavení jednotky správy paměti (MMU) nebo obsluhu přerušení. Další obvyklou součástí jádra je plánování vláken procesů, je totiž navázáno na obsluhu přerušení časovače. Jedná-li se o mikrojádro, jedinou další běžnou součástí jádra je nějaký mechanismus meziprocesové komunikace, ostatní služby jsou odsunuty do uživatelského režimu", "a": true, "exp": "Tvrdenie je pravdivé. Jadro ako jediná komponenta v privilegovanom režime spravuje MMU, obsluhu prerušení a plánovanie vlákien (naviazané na časovač). Mikrojadro presúva maximum služieb do užívateľského priestoru a ponecháva len IPC a základné abstrakcie."}, {"ch": "Jadro a hypervizor", "q": "Protože jádro běží v jiném režimu než zbytek systému, musí pro využívání jeho služeb existovat speciální mechanismus, který bezpečně předá řízení a zároveň přepne procesor: tento mechanismus nazývá systémové volání. Nejběžnější implementací je použití tzv. softwarového přerušení, relativně oblíbené jsou ale i specializované instrukce procesoru (např. syscall, sysenter). Výhodou softwarového přerušení je jeho rychlost, výhodou specializované instrukce je zase jednoduchost použití.", "a": false, "exp": "Tvrdenie je nepravdivé v porovnaní výhod — je to naopak. Softwarové prerušenie je pomalšie (vyhľadávanie v IDT), zatiaľ čo špeciálne inštrukcie syscall/sysenter sú rýchlejšie. Moderné OS preto preferujú syscall/sysenter pre výkon systémových volaní."}, {"ch": "Jadro a hypervizor", "q": "Častou vlastností virtualizačních řešení je schopnost tzv. živé [live] migrace. Tato je řešena tak, že ještě během standardního provozu (před zastavením VM) začne systém kopírovat paměť na cílový počítač, a zároveň zakáže virtualizovanému systému provádět jakékoliv zápisy do již zkopírované paměti. Protože v běžném provozu se paměť prakticky pouze čte (zapisuje se jen velmi zřídka), toto omezení nijak významné. Poté následuje již běžná migrace: stroj je pozastaven, je přenesen stav procesoru, a systém je probuzen na cílovém počítači.", "a": false, "exp": "Tvrdenie je nepravdivé. Live migrácia nezakazuje zápisy do skopírovanej pamäte — sleduje 'dirty pages' (stránky zmenené po skopírovaní) a tieto stránky kopíruje znova iteratívne. Až keď je počet dirty pages dostatočne malý, VM sa krátko pozastaví, prenesie zvyšok a spustí na cieľovom stroji."}, {"ch": "Súbory a súborové systémy", "q": "Tabulka je jednoduchá datová struktura, která odpovídá klasickému poli: jedná se o souvislou oblast fixně velkých záznamů (řádků) zvolených tak, aby se jich do jednoho bloku vešel celočíselný počet. Jako odkaz na záznam tabulky lze pak použít pořadové číslo tohoto záznamu (analogicky k indexu do pole). Tabulky jsou v souborovém systému obvykle alokovány pevně (to mimo jiné znamená, že celková velikost tabulky je předem známá).", "a": true, "exp": "Tvrdenie je pravdivé. Tabuľka v súborovom systéme je pole fixne veľkých záznamov — prístup cez poradové číslo je O(1). Pevná alokácia (napr. tabuľka i-uzlov v ext4) znamená, že maximálny počet záznamov je určený pri formátovaní."}, {"ch": "Súbory a súborové systémy", "q": "Jedním z úkolů souborového systému je organizace volných bloků, do kterých lze uložit nově příchozí data. Protože vyhledání vhodného datového bloku je častá operace, musí být efektivní - jak samotné nalezení vhodného bloku (nebo souvislé oblasti bloků), tak poznačení informace o tom, že vybrané bloky již nejsou volné. Možným řešením je použití B-stromů, ve kterých jsou jako klíče uloženy adresy volných bloků, resp. jejich rozsahů.", "a": true, "exp": "Tvrdenie je pravdivé. B-stromy sú vhodnou štruktúrou pre správu voľných blokov (napr. extent-based alokátor v ext4 alebo Btrfs), pretože umožňujú efektívne vyhľadanie voľného bloku aj aktualizáciu v logaritmickom čase."}, {"ch": "Súbory a súborové systémy", "q": "Žurnál musí být navržen tak, aby bylo souborový systém možné opravit i v situaci, kdy dojde k havárii během obnovy metadat podle žurnálu. Obvyklým řešením tohoto problému je po přehrání každé transakce tuto označit jako hotovou – tím se zabrání pokusu o její opětovnou aplikaci v případě, že je potřeba v obnově pokračovat po jejím neplánovaném přerušení.", "a": false, "exp": "Tvrdenie je nepravdivé. Štandardné riešenie idempotentnosti žurnálu je iné: transakcie sa označia ako 'committed' pri zapísaní do žurnálu, a pri obnove sa jednoducho prehrávajú všetky potvrdené ale ešte neaplikované transakcie — čo je bezpečné, pretože operácie sú idempotentné."}, {"ch": "Súbory a súborové systémy", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů [file descriptor], která je společná pro všechny procesy. Tato tabulka dále asociuje popisovače s otevřenými soubory (o nichž jsou vedeny záznamy v tabulce otevřených souborů). Je-li otevřen obyčejný soubor, je asociovaný s i-uzlem (nebo ekvivalentem) na disku, a tím umožňuje programu číst a zapisovat data příslušného souboru.", "a": false, "exp": "Tvrdenie je nepravdivé. Tabuľka file descriptorov NIE je spoločná pre všetky procesy — každý proces má svoju vlastnú. Spoločná (na úrovni jadra) je tabuľka otvorených súborov (open file table), na ktorú záznamy v procesných tabuľkách odkazujú."}, {"ch": "Súbory a súborové systémy", "q": "Efektivní implementace adresáře je možná například za pomoci B-stromu. Klíče tohoto stromu jsou jména odkazů a hodnoty jsou samotné odkazy na soubory (i-uzly, nebo ekvivalent). Vyhledání odkazu podle jména má logaritmickou složitost, stejně tak i vložení nového odkazu do adresáře. Tato reprezentace má oproti hašovaným složkám nevýhodu, že typické adresáře (s řádově stovkami záznamů) vyžadují desítky pater, a tedy i desítky čtení z pevného úložiště při hledání klíče.", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnej časti. B-strom s typickými adresármi (stovky záznamov) má rádovo 2-3 úrovne, nie desiatky. Práve preto sú B-stromy efektívne — tvrdenie o 'desiatkach pater' je výrazne zveličené."}, {"ch": "Síť a sockety", "q": "Téměř každý operační systém poskytuje implementaci protokolu rodiny TCP/IP a jedná se totiž o protokoly, které se používají na internetu. V systémech POSIX slouží k práci s těmito protokoly tzv. Sockety, které používají API podobné tomu pro práci se soubory. U spojovaných protokolu (TCP, UDP) odpovídá docket právě jednomu spojení. Nespojované protokoly (ICMP, ARP) se sockety přímo používat nelze.", "a": false, "exp": "Tvrdenie je nepravdivé. UDP je nespojovaný protokol (nie spojovaný), takže zaradenie TCP aj UDP do 'spojovaných protokolov' je chybné. Navyše ICMP a ARP je možné používať cez raw sockety — tvrdenie, že sa nedajú, je nepravdivé."}, {"ch": "Síť a sockety", "q": "Protokol TCP používá k zlepšení spolehlivosti komunikace tzv. potvrzovací zprávy (ACK): potvrzováním je realizováno pomocí tzv. sekvenčních čísel: jednotlivé pakety jsou očíslovány v pořadí odeslání, a příjemce při nejbližší příležitosti oznámí odesílateli, která čísla paketů již viděl. Odesílatel u každého paketu vyčká na potvrzení, až poté odešle další paket. Nedorazí-li potvrzení v předem domluveném čase, pošle znovu předchozí paket.", "a": false, "exp": "Tvrdenie je nepravdivé. TCP neposiela po jednom pakete a nečaká na ACK — používa sliding window (posuvné okno), vďaka čomu môže mať súčasne v sieti viacero nepotvrdených paketov. To dramaticky zvyšuje priepustnosť oproti stop-and-wait protokolu opísanému v tvrdení."}, {"ch": "Síť a sockety", "q": "Protokol IP je protokolem třetí vrstvy modelu ISO/OSI a může být tedy realizován na různých instancích nižších vrstev (nejčastěji ale na Ethernetu). Pro doručení paketů protokolu IP musí mít systém k dispozici tzv. hardwarovou adresu (v případě Ethernetu známou jako MAC). Pro překlad mezi adresami IP a adresami nižší vrstvy slouží protokol ARP [Address Resolution Protocol], který pracuje podobně jako DNS: servery ARP udržují globální databázi IP adres a jim odpovídajících MAC adres.", "a": false, "exp": "Tvrdenie je nepravdivé. ARP nefunguje ako DNS a nemá globálne servery. ARP je broadcast protokol lokálnej siete — zariadenie vyšle broadcast 'kto má túto IP?' a majiteľ odpovie svojou MAC adresou. ARP cache je lokálna na každom zariadení."}, {"ch": "Síť a sockety", "q": "Pro překlad lidsky zapamatovatelných jmen počítačů na IP adresy se používá tzv. protokol DNS. Jedná se o hierarchický systém jmen, kde jsou jednotlivé úrovně odděleny tečkou, v „little endian“ pořadí (např. www.fi.muni.cz). Organizace DNS serverů odpovídá hierarchické struktuře jmen a překlad jména postupuje rekurzí zprava doleva.", "a": true, "exp": "Tvrdenie je pravdivé. DNS je hierarchický systém s úrovňami oddelenými bodkou v 'little-endian' poradí (najpravejšia časť je koreňová doména). Rezolúcia postupuje sprava doľava — root servery → TLD → autoritatívny server."}, {"ch": "Síť a sockety", "q": "Krom specializovaných operací send a recv je se sockety možné používat i obecné write a read. Díky tomu je možné programovat vstupně-výstupní podprogramy obecně - stejný podprogram může data vypsat na obrazovku nebo odeslat po síti, podle toho jaký typ objektu se skrývá za předaným popisovačem. Pomineme-li efekty souběžnosti, u většiny objektů celkový výsledek nezáleží na počtu operací write, které provedeme, jsou-li zapsány stejné bajty ve stejném pořadí. Důležitou výjimku tvoří datagramové sockety, kde vznikne každým použitím write nový datagram.", "a": true, "exp": "Tvrdenie je pravdivé. Sockety implementujú štandardné file descriptor rozhranie, takže write/read fungujú rovnako ako na iných fd. Výnimka pre datagramové sockety je správna — každé write vytvorí jeden datagram, takže ich počet záleží."}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Podobně jako jádro běží systémové knihovny s vyšší úrovní oprávnění, než samotná aplikace. Systémové knihovny můžou být statické nebo sdílené, ale preferovány jsou většinou sdílené, a to ze dvou důvodů: umožňuje to dodavateli OS dodatečně opravit případné chyby (bez spolupráce dodavatelů aplikačních programů) a zároveň se tím šetří prostředky (zejména paměť).", "a": false, "exp": "Tvrdenie je nepravdivé. Systémové knižnice bežia v UŽÍVATEĽSKOM režime, nie privilegovanom. Sú síce súčasťou OS distribúcie, ale na privilegované operácie musia zavolať jadro cez systémové volanie — samé nemajú vyššie oprávnenia ako bežná aplikácia."}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Zároveň je jazyk C často i implementačním jazykem nižších vrstev operačního systému.", "a": true, "exp": "Tvrdenie je pravdivé. C je lingua franca systémového programovania — je prenositeľný na úrovni zdrojového kódu medzi architektúrami, má štandardizované ABI a väčšina jazykov má FFI (foreign function interface) pre volanie C funkcií."}, {"ch": "POSIX a jazyk C", "q": "Vstupem pro linker jsou zejména objektové soubory, případně statické a dynamické knihovny. Jeho hlavní úlohou je z objektových souborů sestavit finální spustitelný soubor. To provede tak, že sloučí stejnojmenné sekce všech vstupních objektových souborů, přiřadí jednotlivým prvkům (podprogramům, proměnným, atp.) adresy a vyřeší relokace (t.j. zapíše do kódu chybějící adresy). Výsledkem (až na sdílené knihovny) kompletní strojový kód, který lze spustit.", "a": true, "exp": "Tvrdenie je pravdivé. Linker skutočne zlúči sekcie (.text, .data, .bss...) zo vstupných objektových súborov, priradí adresy symbolom a vykoná relokacie. Výsledok je spustiteľný súbor so všetkým strojovým kódom (okrem symbolov zdieľaných knižníc, riešených dynamickým linkerom za behu)."}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány jako tzv. archivy: soubory, které obsahují kolekci objektových souborů a případně metadata, která usnadní práci linkeru. Při sestavování programu se statické knihovny chovají jako monolitický celek: linker použije vždy všechny části (objektové soubory), které se v daném archivu nachází.", "a": false, "exp": "Tvrdenie je nepravdivé. Statické knižnice (archívy .a) sa NEsprávajú ako monolitický celok — linker z archívu vytiahne len tie objektové súbory, ktoré obsahujú symboly potrebné pre linkovaný program. Nepoužité objektové súbory sa do výsledného binárneho súboru nezaradia."}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám několik výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Statické knihovny naopak zjednodušují aktualizace systému: novou verzi knihovny můžou v tomto případě již sestavené programy využívat bez jakéhokoliv zásahu do spustitelných souborů.", "a": false, "exp": "Tvrdenie je nepravdivé v záverečnej časti. Zjednodušenie aktualizácií je výhodou ZDIEĽANÝCH knižníc, nie statických — pri zdieľanej knižnici stačí nahradiť jeden .so súbor a všetky programy okamžite použijú novú verziu. Pri statických musí každý program byť znova zlinkovaný."}];

let questions = [...ALL_QUESTIONS];

let activeChapter = 'all';

function getChapterQuestions(ch) {
  return ch === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.ch === ch);
}

function onChapterChange() {
  const sel = document.getElementById('chapterSelect').value;
  activeChapter = sel;
  questions = getChapterQuestions(sel);
  answers = {};
  current = 0;
  filter = 'all';
  render();
}

function goToQuestion() {
  const input = document.getElementById('searchInput');
  const errEl = document.getElementById('searchErr');
  const val = parseInt(input.value);
  const total = ALL_QUESTIONS.length;
  if (isNaN(val) || val < 1 || val > total) {
    errEl.textContent = `Zadaj číslo od 1 do ${total}`;
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  const targetQ = ALL_QUESTIONS[val - 1];
  if (activeChapter !== 'all' && targetQ.ch !== activeChapter) {
    activeChapter = 'all';
    document.getElementById('chapterSelect').value = 'all';
    questions = [...ALL_QUESTIONS];
    answers = {};
  }
  filter = 'all';
  current = questions.indexOf(targetQ);
  input.value = '';
  render();
}

function filtered() {
  if (filter === 'all') return questions;
  if (filter === 'unanswered') return questions.filter((q) => answers[questions.indexOf(q)] === undefined);
  if (filter === 'wrong') return questions.filter((q) => {
    const gi = questions.indexOf(q);
    return answers[gi] !== undefined && answers[gi] !== q.a;
  });
  return questions;
}

function render() {
  const app = document.getElementById('app');
  const total = questions.length;
  const correct = questions.filter((q,i) => answers[i] === q.a).length;
  const wrong = questions.filter((q,i) => answers[i] !== undefined && answers[i] !== q.a).length;
  const answered = Object.keys(answers).length;
  const remaining = total - answered;

  if (answered === total && filter === 'all') {
    const pct = Math.round(correct / total * 100);
    app.innerHTML = `<div class="end">
      <div class="end-score" style="color:${pct>=70?'#2a7a4f':'#c0392b'}">${pct}%</div>
      <div class="end-sub">${correct} z ${total} správne &nbsp;·&nbsp; ${wrong} chybne</div>
      <button class="ctrl-btn primary" onclick="restart()">Zopakovať od začiatku</button>
      <button class="ctrl-btn" style="margin-left:8px" onclick="showWrong()">Pozrieť chybné (${wrong})</button>
    </div>`;
    return;
  }

  const qs = filtered();
  if (qs.length === 0) {
    app.innerHTML = `<div style="text-align:center;padding:2rem"><p>Žiadne otázky vo filtri.</p><button class="ctrl-btn" onclick="setFilter('all')">Zobraziť všetky</button></div>`;
    return;
  }
  const di = Math.min(current, qs.length - 1);
  const q = qs[di];
  const gi = questions.indexOf(q);
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  const ua = answers[gi];
  const revealed = ua !== undefined;

  let tClass = 'btn-tf', fClass = 'btn-tf';
  if (revealed) {
    if (ua === true)  tClass += q.a === true  ? ' bt-correct' : ' bt-wrong';
    if (ua === false) fClass += q.a === false ? ' bt-correct' : ' bt-wrong';
  }

  const explainHtml = (revealed && q.exp)
    ? `<div class="explain-box">💡 ${q.exp}</div>`
    : '';

  const fb = revealed ? `<div class="feedback ${ua===q.a?'fb-ok':'fb-no'}">
    ${ua===q.a ? '✓ Správne' : '✗ Nesprávne — správna odpoveď: <strong>'+(q.a?'PRAVDA':'NEPRAVDA')+'</strong>'}
  </div>` : '';

  app.innerHTML = `
    <div class="progress-outer"><div class="progress-inner" style="width:${Math.round(answered/total*100)}%"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-n n-c">${correct}</div><div class="stat-l">Správne</div></div>
      <div class="stat"><div class="stat-n n-w">${wrong}</div><div class="stat-l">Chybne</div></div>
      <div class="stat"><div class="stat-n n-r">${remaining}</div><div class="stat-l">Zostáva</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">Všetky (${total})</button>
      <button class="filter-btn ${filter==='unanswered'?'active':''}" onclick="setFilter('unanswered')">Nezodpovedané (${remaining})</button>
      <button class="filter-btn ${filter==='wrong'?'active':''}" onclick="setFilter('wrong')">Chybné (${wrong})</button>
      <button class="filter-btn" onclick="shuffle()">🔀 Zamiešať</button>
    </div>
    <div class="q-num">Otázka ${globalIdx+1} z ${ALL_QUESTIONS.length} &nbsp;·&nbsp; ${di+1}/${qs.length} vo filtri</div>
    <div class="card">
      <div class="ch-label">${q.ch}</div>
      <div class="q-text">${q.q}</div>
      <div class="btn-row">
        <button class="${tClass}" onclick="answer(${gi}, true)" ${revealed?'disabled':''}>✓ Pravda</button>
        <button class="${fClass}" onclick="answer(${gi}, false)" ${revealed?'disabled':''}>✗ Nepravda</button>
      </div>
      ${fb}
      ${explainHtml}
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prev()" ${current===0?'disabled':''}>← Späť</button>
      <button class="ctrl-btn primary" onclick="next()" ${di===qs.length-1?'disabled':''}>Ďalej →</button>
    </div>`;
}

function answer(gi, val) { answers[gi] = val; render(); }
function next() { const qs = filtered(); if (current < qs.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function setFilter(f) { filter = f; current = 0; render(); }
function showWrong() { filter = 'wrong'; current = 0; render(); }
function shuffle() {
  for (let i = questions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  answers = {}; current = 0; render();
}
function restart() {
  questions = getChapterQuestions(activeChapter);
  answers = {}; current = 0; filter = 'all'; render();
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  const qs = filtered();
  const q = qs[Math.min(current, qs.length-1)];
  const gi = questions.indexOf(q);
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if ((e.key === 'p' || e.key === 'P') && answers[gi] === undefined) answer(gi, true);
  else if ((e.key === 'n' || e.key === 'N') && answers[gi] === undefined) answer(gi, false);
});

render();
</script>
</body>
</html>
