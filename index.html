<script>
const ALL_QUESTIONS = [{"ch": "Virtualizace pameti", "q": "Přesto, že duplikace procesu (např. systémovým voláním fork) musí zdánlivě vytvořit kopii celého jeho adresního prostoru, jedná se o relativně levnou operaci. Toho je dosaženo tzv. metodou „copy on write“, kdy operační systém pouze označí celý adresní prostor za sdílený (a tedy pouze pro čtení) a stránky, které se některý proces pokusí změnit, dle potřeby kopíruje.", "a": true}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti umožňuje nastavit jednotlivým stránkám základní přístupová práva, zejména je možné stránky označit jako „pouze pro čtení“. Pokusí-li se program do takové stránky zapsat, procesor vyvolá výjimku a předá řízení jádru. Protože proces, který takto porušil ochranu paměti, nemůže v žádném případě pokračovat ve výpočtu, jádro jej násilně ukončí s chybou „segmentation fault“.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti (známá též jako MMU) je součástí procesoru, které základní funkcí je překládat virtuální adresy na fyzické. Překlad adres je řízen stránkovými tabulkami, které jsou typicky uloženy na fyzické adrese uložené ve speciálním registru. Je-li potřeba přepnout právě běžící proces, stačí přepsat tento registr: stránkové tabulky různých procesů jsou uloženy na různých místech v paměti.", "a": true}, {"ch": "Virtualizace pameti", "q": "Stránkové tabulky jsou uloženy v operační paměti, ale jejich přesná struktura je vlastností konkrétního hardwaru. Přestože moderní počítače mají velké adresní prostory ($2^{32}$ nebo $2^{64}$ virtuálních adres), používají husté překladové tabulky. Tyto stránkové tabulky mají víc úrovní, ale protože jsou husté, řádky mohou být označeny jako nepřítomné pouze v tabulkách nejnižší úrovně. Pokus o výběr takového řádku značí použití neplatné virtuální adresy.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti pracuje s tzv. rámci a stránkami, které mají fixní velikost (často 4KiB): stránky reprezentují fyzické adresy, kdežto rámce reprezentují adresy virtuální. Rámec dat lze uložit do stránky v operační paměti [RAM], případně na disk. Na resynch stránkách v operační paměti můžou být ve stejnou dobu uloženy rámce různých procesů. Přepnutí procesu tedy nemusí dotčené rámce nijak přesouvat.", "a": false}, {"ch": "Virtualizace pameti", "q": "Virtualizace adresního prostoru (implementovaná prostřednictvím překladu virtuálních adres na fyzické jednotkou správy paleta) slouží v moderních operačních systémech mimo jiné k implementaci externího stránkování, kdy jsou všechny aktivní stránky uloženy krom operační paměti také v externí paměti (na disku). V případě nedostatku operační paměti tedy může operační systém libovolný rámec kdykoliv přepsat novou stránkou.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti (známá též jako MMU) je součástí procesoru, které základní funkcí je překládat virtuální adresy na fyzické. Překlad adres je řízen stránkovými tabulkami, které jsou typicky uložené na předem domluvené (fixní) fyzické adrese. Je-li potřeba přepnout právě běžící proces, operační systém stránkové tabulky přepíše verzí, která odpovídá adresnímu prostoru nového procesu.", "a": false}, {"ch": "Virtualizace pameti", "q": "Líné načítání je formou externího stránkování, která využívá jednotky správy paměti k optimalizaci načítání dat z externího úložiště do operační paměti. Podobně jako při běžném externím stránkování alokuje operační systém pro data virtuální adresy, ale nepřidělí jim žádnou fyzickou (operační) paměť. Samotné načtení se realizuje až ve chvíli, kdy se program pokusí k takto vyhrazené (ale z pohledu procesoru neplatné) virtuální adrese přistoupit.", "a": true}, {"ch": "Virtualizace pameti", "q": "Přesto, že duplikace procesu (např. systémovým voláním fork) musí zdánlivě vytvořit kopii celého jeho adresního prostoru, jedná se o relativně levnou operaci. Toho je dosaženo tzv. metodou „copy on write“, kdy operační systém pouze označí celý adresní prostor za sdílený (a tedy pouze pro čtení) a stránky, které se některý proces pokusí změnit, dle potřeby kopíruje.", "a": true}, {"ch": "Virtualizace pameti", "q": "Stránkové tabulky jsou uloženy v operační paměti, ale jejich přesná struktura je vlastností konkrétního hardwaru. Protože moderní počítače mají velké adresní prostory ($2^{32}$ nebo $2^{64}$ virtuálních adres), používají víceúrovňové překladové tabulky. Tyto Strankove tabulky jsou navíc řídké, ale pouze na nejvyšší úrovni – v tabulkách nižší úrovně musí každý řádek obsahovat platný záznam a označovat tak platný rozsah virtuálních adres.", "a": false}, {"ch": "Virtualizace pameti", "q": "Stránkové tabulky jsou uloženy v operační paměti, ale jejich přesná struktura je vlastností konkrétního hardwaru. Protože moderní počítače mají velké adresní prostory ($2^{32}$ nebo $2^{64}$ virtuálních adres), používají obvykle řídké, víceúrovňové překladové tabulky. Řádky jednotlivých tabulek tedy mohou být označeny jako nepřítomné – pokus o výběr takového řádku značí použití neplatné virtuální adresy", "a": true}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti (známá též jako MMU) je součástí procesoru, které základní funkcí je překládat virtuální adresy na fyzické. Překlad adres je řízen stránkovými tabulkami, které jsou typicky uložené na předem domluvené (fixní) fyzické adrese. Je-li potřeba přepnout právě běžící proces, operační systém stránkové tabulky přepíše verzí, která odpovídá adresnímu prostoru nového procesu.", "a": false}, {"ch": "Virtualizace pameti", "q": "Má-li operační systém nedostatek použitelných fyzických adres, může některou stránku odstěhovat z operační paměti někam jinam, např. na externí (pevné) úložiště. Toto je sice mnohem pomalejší, ale často má i mnohem větší kapacitu. Tento mechanismus se nazývá externí stránkování. Jeho největším omezením je právě rychlost přenosu dat mezi operační pamětí a pevným úložištěm - je proto nutné co nejvíce omezit frekvenci přesunu stránek mezi nimi.", "a": true}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti pracuje s tzv. rámci a stránkami, které mají fixní velikost (často 4KiB): stránky reprezentují fyzické adresy, kdežto rámce reprezentují adresy virtuální. Rámec dat lze uložit do stránky v operační paměti [RAM], případně na disk. Na různých stránkách v operační paměti můžou být ve stejnou dobu uloženy rámce různých procesů. Přepnutí procesu tedy nemusí dotčené rámce nijak přesouvat.", "a": false}, {"ch": "Virtualizace pameti", "q": "Přesto, že duplikace procesu (např. systémovým voláním fork) musí zdánlivě vytvořit kopii celého jeho adresního prostoru, jedná se o relativně levnou operaci. Toho je dosaženo tak, že operační systém pouze označí celý adresní prostor za sdílený (a tedy pouze pro čtení). Rodičovský proces je v tento moment pozastaven až do doby, než potomek získá nový adresní prostor (např. systémovým voláním exec). Protože od tohoto momentu už adresní prostor není sdílený, může rodič pokračovat ve výpočtu jako obvykle.", "a": false}, {"ch": "Virtualizace pameti", "q": "Stránkové tabulky jsou uloženy v operační paměti, ale jejich přesná struktura je vlastností konkrétního hardwaru. Protože moderní počítače mají velké adresní prostory ($2^{32}$ nebo $2^{64}$ virtuálních adres), používají víceúrovňové překladové tabulky. Tyto stránkové tabulky jsou navíc řídké, ale pouze na nejvyšší úrovni – v tabulkách nižší úrovně musí každý řádek obsahovat platný záznam a označovat tak platný rozsah virtuálních adres.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti pracuje s tzv. rámci a stránkami, které mají fixní velikost (často 4KiB): rámce reprezentují fyzickou paměť, kdežto stránky reprezentují data. Stránku dat lze tedy uložit do rámce v operační paměti [RAM], případně na disk. Přepnutí procesu se realizuje nejčastěji tak, že stránky dosud aktivního procesu se přesunou z rámců na disk, a takto uvolněné rámce se naplní stránkami nového procesu.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti umožňuje nastavit jednotlivým stránkám základní přístupová práva, zejména je možné stránky označit jako „pouze pro čtení“. Pokusí-li se program do takové stránky zapsat, procesor vyvolá výjimku a předá řízení jádru. Protože proces, který takto porušil ochranu paměti, nemůže v žádném případě pokračovat ve výpočtu, jádro jej násilně ukončí s chybou „segmentation fault“.", "a": false}, {"ch": "Virtualizace pameti", "q": "Virtualizace adresního prostoru (implementovaná prostřednictvím překladu virtuálních adres na fyzické jednotkou správy paměti) slouží v moderních operačních systémech mimo jiné k implementaci externího stránkování, kdy při nedostatku operační paměti operační systém část dat přesune na externí (pevné) úložiště.", "a": true}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti (známá též jako MMU) je součástí procesoru, které základní funkcí je překládat virtuální adresy na fyzické. Překlad adres je řízen stránkovými tabulkami, které jsou typicky uloženy na fyzické adrese uložené ve speciálním registru. Je-li potřeba přepnout právě běžící proces, stačí přepsat tento registr: stránkové tabulky různých procesů jsou uloženy na různých místech v paměti.", "a": true}, {"ch": "Virtualizace pameti", "q": "Líné načítání je formou externího stránkování, která využívá jednotky správy paměti k optimalizaci načítání dat z externího úložiště do operační paměti. Podobně jako při běžném externím stránkování alokuje operační systém pro data virtuální adresy, ale nepřidělí jim žádnou fyzickou (operační) paměť. Samotné načtení se realizuje až ve chvíli, kdy se program pokusí k takto vyhrazené (ale z pohledu procesoru neplatné) virtuální adrese přistoupit.", "a": true}, {"ch": "Virtualizace pameti", "q": "Stránkové tabulky jsou uloženy v operační paměti, ale jejich přesná struktura je vlastností konkrétního hardwaru. Protože moderní počítače mají velké adresní prostory ($2^{32}$ nebo $2^{64}$ virtuálních adres), používají víceúrovňové překladové tabulky. Tyto stránkové tabulky jsou navíc řídké, ale pouze na nejvyšší úrovni – v tabulkách nižší úrovně musí každý řádek obsahovat platný záznam a označovat tak platný rozsah virtuálních adres.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti (známá též jako MMU) je součástí procesoru, které základní funkcí je překládat virtuální adresy na fyzické. Překlad adres je řízen stránkovými tabulkami, které jsou uložené ve speciální sadě registrů. Je-li potřeba přepnout právě běžící proces, operační systém stránkové tabulky přepíše verzí, která odpovídá adresnímu prostoru nového procesu.", "a": false}, {"ch": "Virtualizace pameti", "q": "Jednotka správy paměti pracuje s tzv. rámci a stránkami, které mají fixní velikost (často 4KiB): stránky reprezentují fyzické adresy, kdežto rámce reprezentují adresy virtuální. Rámec dat lze uložit do stránky v operační paměti [RAM], případně na disk. Na různých stránkách v operační paměti můžou být ve stejnou dobu uloženy rámce různých procesů. Přepnutí procesu tedy nemusí dotčené rámce nijak přesouvat.", "a": false}, {"ch": "Virtualizace pameti", "q": "Přesto, že duplikace procesu (např. systémovým voláním fork) musí zdánlivě vytvořit kopii celého jeho adresního prostoru, jedná se o relativně levnou operaci. Toho je dosaženo tzv. metodou „copy on write“, kdy operační systém pouze označí celý adresní prostor za sdílený (a tedy pouze pro čtení) a stránky, které se některý proces pokusí změnit, dle potřeby kopíruje.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Afinitou označujeme snahu plánovače omezit přesuny vláken mezi různými procesorovými jádry. Plánovače mohou mít různou úroveň afinity - od takových, které vůbec afinitu nemají, přes kompromisní návrhy, které vlákna přesouvají pouze za určitých okolností (obvyklým řešením je občasné náhodné přesunutí vlákna ve chvíli, kdy přechází ze stavu „čeká na procesor“ do stavu „běží“), až k plánovačům, které vlákna mezi procesory nepřesouvají vůbec.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší na některé předem označené instrukci a procesor uvolní pro běh jiného vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc procesorového času než jiný uživatel, který má proces pouze jeden. Tento problém se obvykle řeší tím, že administrátor nastaví každému uživateli maximální počet procesů a vláken, které mohou současně běžet.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken. Náleží-li tato vlákna různým procesům, dojde také k výměně stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového procesu.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Vlákno může být z pohledu plánování ve třech základních stavech: 1) právě běží, 2) čeká na procesor (je připraveno ke běhu ale právě není k dispozici volné výpočetní jádro), 3) čeká na událost (vlákno nemůže pokračovat ve výpočtu dokud nenastane nějaká vnější událost). Přesun přímo ze stavu „čeká na procesor“ do stavu „čeká na událost“ není možný, ale všechny ostatní změny stavu přípustné jsou.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Rozhodování o tom, kdy aktivnímu vláknu odebrat procesor (tzn. přesunout jej ze stavu „běží“ do stavu „čeká na procesor“) závisí na konkrétním plánovacím algoritmu. Obvyklý návrh nechá právě aktivní vlákno běžet nějaký minimální čas i v situaci, kdy je ke běhu připraveno vlákno s vyšší prioritou. Tomuto minimálnímu času říkáme plánovací kvantum, a jeho smyslem je zabránit příliš častému přepínání vlák", "a": true}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší na některé předem označené instrukci a procesor uvolní pro běh jiného vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken. Náleží-li tato vlákna různým procesům, dojde také k výměně stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového procesu.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc procesorového času než jiný uživatel, který má proces pouze jeden. Tento problém se obvykle řeší tím, že administrátor nastaví každému uživateli maximální počet procesů a vláken, které mohou současně běžet.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Afinitou označujeme snahu plánovače omezit přesuny vláken mezi různými procesorovými jádry. Plánovače mohou mít různou úroveň afinity - od takových, které vůbec afinitu nemají, přes kompromisní návrhy, které vlákna přesouvají pouze za určitých okolností (obvyklým řešením je občasné náhodné přesunutí vlákna ve chvíli, kdy přechází ze stavu „čeká na procesor“ do stavu „běží“), až k plánovačům, které vlákna mezi procesory nepřesouvají vůbec.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc procesorového času než jiný uživatel, který má proces pouze jeden. Schopnost plánovače zamezit takto nevyrovnanému přidělování zdrojů nazýváme férovost.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší na některé předem označené instrukci a procesor uvolní pro běh jiného vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Vlákno může být z pohledu plánování ve třech základních stavech: 1) právě běží, 2) čeká na procesor (je připraveno ke běhu ale právě není k dispozici volné výpočetní jádro), 3) čeká na událost (vlákno nemůže pokračovat ve výpočtu dokud nenastane nějaká vnější událost). Přesun přímo ze stavu „čeká na procesor“ do stavu „čeká na událost“ není možný, ale všechny ostatní změny stavu přípustné jsou.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Afinitou označujeme snahu plánovače omezit přesuny vláken mezi různými procesorovými jádry. Plánovače mohou mít různou úroveň afinity - od takových, které vůbec afinitu nemají, přes kompromisní návrhy, které vlákna přesouvají pouze za určitých okolností (obvyklým řešením je občasné náhodné přesunutí vlákna ve chvíli, kdy přechází ze stavu „čeká na procesor“ do stavu „běží“), až k plánovačům, které vlákna mezi procesory nepřesouvají vůbec.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken, které spočívá v přepsání stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Odebírání procesoru běžícímu vláknu je realizováno napojením plánovače na obsluhu přerušení časovače. Frekvence tohoto časovače rozhoduje mimo jiné o kompromisu mezi latencí (reakční dobou) a propustností systému: vyšší frekvence znamená nižší latenci (kratší reakční dobu), ale je spojena s vyšší režií (obsluha přerušení zabere v úhrnu více procesorového času).", "a": true}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc procesorového času než jiný uživatel, který má proces pouze jeden. Tento problém se obvykle řeší tím, že administrátor nastaví každému uživateli maximální počet procesů a vláken, které mohou současně běžet.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší na některé předem označené instrukci a procesor uvolní pro běh jiného vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken, které spočívá v přepsání stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Afinitou označujeme snahu plánovače omezit přesuny vláken mezi různými procesorovými jádry. Plánovače mohou mít různou úroveň afinity - od takových, které vůbec afinitu nemají, přes kompromisní návrhy, které vlákna přesouvají pouze za určitých okolností (zejména je-li zátěž jednotlivých procesorů příliš nevyvážená), až k plánovačům, které vlákna mezi procesory nepřesouvají vůbec.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Při plánování vláken vyvstává otázka, kolik procesorového času by mělo které vlákno dostat. Není totiž žádoucí, aby proces se 100 vlákny dostal stonásobně víc procesorového času, než proces s jedním vláknem. Podobně nechceme, aby uživatel se 100 procesy dostal stonásobně víc procesorového času než jiný uživatel, který má proces pouze jeden. Tento problém se obvykle řeší tím, že administrátor nastaví každému uživateli maximální počet procesů a vláken, které mohou současně běžet.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Odebírání procesoru běžícímu vláknu je realizováno napojením plánovače na obsluhu přerušení časovače. Frekvence tohoto časovače rozhoduje mimo jiné o kompromisu mezi latencí (reakční dobou) a propustností systému: vyšší frekvence znamená vyšší latenci (delší reakční dobu), ale je spojena s nižší režií (obsluha přerušení zabere v úhrnu méně procesorového času).", "a": false}, {"ch": "Virtualizace procesoru", "q": "Plánovač procesů je centrální součástí jádra operačního systému. Jeho základním úkolem je přidělovat procesor jednotlivým vláknům, a případně jej opět odebírat, dojde-li aktuálně běžícímu vláknu jeho přidělený čas. Plánovač také realizuje samotné přepínání běžících vláken, které spočívá v přepsání stránkovacích tabulek tak, aby odpovídaly adresnímu prostoru nového vlákna.", "a": false}, {"ch": "Virtualizace procesoru", "q": "Díky preemptivnímu plánování mohou jednotlivá vlákna předstírat, že mají celý procesor jen pro sebe (nemusí tedy obsahovat žádný speciální kód pro uvolnění procesoru). Plánovač dle potřeby vlákno přeruší a procesor uvolní pro běh jiného vlákna, a to kdykoliv v průběhu výpočtu.", "a": true}, {"ch": "Virtualizace procesoru", "q": "Vlákno může být z pohledu plánování ve třech základních stavech: 1) právě běží, 2) čeká na procesor (je připraveno ke běhu ale právě není k dispozici volné výpočetní jádro), 3) čeká na událost (vlákno nemůže pokračovat ve výpočtu dokud nenastane nějaká vnější událost). Přechod ze stavu „běží“ do stavu „čeká na procesor“ obvykle vyvolává plánovač - takovému přechodu říkáme preempce (odebrání procesoru).", "a": true}, {"ch": "Souborové systémy", "q": "Vyrovnávací paměť uchovává požadavky na zápis, které dosud nebyly plně vyřízeny, mimo jiné proto, aby aplikace nemusela při každém zápisu čekat na jeho zdlouhavé dokončení. Tato vyrovnávací paměť může být propojená s mezipamětí nebo oddělená. V tom druhém případě je od mezipaměti zcela nezávislá. Výhodou tohoto návrhu je větší propustnost zápisů.", "a": false}, {"ch": "Souborové systémy", "q": "Jedním z úkolů souborového systému je organizace volných bloků, do kterých lze uložit nově příchozí data. Protože vyhledání vhodného datového bloku je častá operace, musí být efektivní - jak samotné nalezení vhodného bloku (nebo souvislé oblasti bloků), tak poznačení informace o tom, že vybrané bloky již nejsou volné. Možným řešením je použití B-stromů, ve kterých jsou jako klíče uloženy adresy volných bloků, resp. jejich rozsahů.", "a": true}, {"ch": "Souborové systémy", "q": "Tabulka je jednoduchá datová struktura, která odpovídá klasickému zřetězenému seznamu: jedná se o řadu fixně velkých záznamů (uzlů) zvolených tak, aby se každý vešel do jednoho bloku. Jako odkaz na záznam takové tabulky lze pak použít adresu bloku, ve kterém je uložen (analogicky k ukazateli na uzel seznamu). V souborových systémech jsou tabulky obvykle alokovány pevně (to například znamená, že mají předem určený počet uzlů).", "a": false}, {"ch": "Souborové systémy", "q": "RAID (Redundant Array of Inexpensive Disks), je technologie, která sdružuje několik disků do jednoho virtuálního blokového zařízení, zejména za účelem zlepšení spolehlivosti. RAID může být realizován jak hardwarově tak i softwarově - v tom druhém případě je implementace součástí blokové vrstvy operačního systému.", "a": true}, {"ch": "Souborové systémy", "q": "Žurnál musí být navržen tak, aby bylo souborový systém možné opravit i v situaci, kdy dojde k další havárii během obnovy metadat podle žurnálu. Obvyklým řešením tohoto problému je po přehrání každé transakce tuto označit jako hotovou - tím se zabrání pokusu o její opětovnou aplikaci v případě, že je potřeba v obnově pokračovat po jejím neplánovaném přerušení.", "a": false}, {"ch": "Souborové systémy", "q": "Jedním z úkolů souborového systému je organizace volných bloků, do kterých lze uložit nově příchozí data. Protože vyhledání vhodného datového bloku je častá operace, musí být efektivní - jak samotné nalezení vhodného bloku (nebo souvislé oblasti bloků), tak poznačení informace o tom, že vybrané bloky již nejsou volné. Nejvhodnější datovou strukturou pro tento účel je B-strom, protože tabulky ani bitmapy pro organizaci volného místa použít nelze.", "a": false}, {"ch": "Souborové systémy", "q": "Žurnál musí být navržen tak, aby bylo souborový systém možné opravit i v situaci, kdy dojde k další havárii během obnovy metadat podle žurnálu. Obvyklým řešením tohoto problému je po přehrání každé transakce tuto označit jako hotovou - tím se zabrání pokusu o její opětovnou aplikaci v případě, že je potřeba v obnově pokračovat po jejím neplánovaném přerušení.", "a": false}, {"ch": "Souborové systémy", "q": "RAID (Redundant Array of Inexpensive Disks), je technologie, která sdružuje několik disků do jednoho virtuálního blokového zařízení, zejména za účelem zlepšení spolehlivosti. RAID může být realizován jak hardwarově tak i softwarově - v tom druhém případě je implementace sou řístupná. O vynucení těchto omezení se stará jednotka správy paměti (MMU).", "a": false}, {"ch": "Periferie", "q": "V moderních systémech se často pro komunikaci mezi hardwarem a softwarem používá přímý přístup do paměti (DMA). V tomto režimu může hardwarové zařízení přímo přistupovat do operační paměti asynchronně vůči procesoru. Tím se výrazně urychlí přenos dat, nicméně procesor musí na dokončení přenosu aktivně čekat - nemůže mezitím vykonávat jinou činnost.", "a": false}, {"ch": "Periferie", "q": "Úkolem sběrnice je jednak přenos dat a signalizace událostí, jednak konfigurace a enumerace připojených periferií. Enumerací sběrnice rozumíme vyjmenování všech připojených periferií a jejich základních parametrů. Takto vyjmenovaná zařízení jsou ve většině systémů opatřena unikátními identifikátory, na základě kterých operační systém zjistí, o jaké přesné zařízení se jedná a díky tomu může zavést a inicializovat potřebný ovladač.", "a": true}, {"ch": "Periferie", "q": "Ovladač je program, často součást jádra, který zprostředkovává komunikaci mezi hardwarem a ostatním softwarem. Ovladače jsou typicky vázané jak na konkrétní hardwarové zařízení, tak i na operační systém. Smyslem ovladače je usnadnit zbytku systému práci s různými periferiemi, které ale slouží stejnému účelu: implementace protokolu TCP tak například nemusí být uzpůsobena každému modelu síťového rozhraní zvlášť.", "a": true}, {"ch": "Periferie", "q": "Síťové rozhraní je zařízení, které zejména přesouvá data mezi sítí a operační pamětí. Krom základního nastavení se tedy ovladač stará hlavně o přenos dat. K tomu slouží tzv. komunikační fronta, do které operační systém ukládá data k odeslání a karta naopak data přijatá ze sítě. Místo ve frontě, které se uvolní odesláním dat, tak může být rovnou využito k uložení dat příchozích.", "a": false}, {"ch": "Periferie", "q": "Ovladač je program, často součást jádra, který zprostředkovává komunikaci mezi hardwarem a ostatním softwarem. Ovladače jsou typicky vázané ja vislost je typ hazardu souběhu, při kterém vlákno A zapisuje do paměťové buňky, vlákno B z téže buňky čte, akce čtení a zápisu jsou souběžné a zároveň další chování vlákna B závisí na přečtené hodnotě. Existují pak konzistentní časové sledy, kdy čtení předběhne zápis, přečte nesprávnou hodnotu a celkový výsledek je tedy také nesprávný. Tato chyba se sice neprojevuje při každém spuštění, ale protože problémové akce jsou souběžné, správný a špatný výsledek budeme dostávat přibližně stejně často.", "a": false}, {"ch": "Súbežnosť a synchronizácia", "q": "O dvou různých událostech A a B musí platit právě jedna ze tří možností - 1) A předchází B; 2) B předchází A; 3) A nepředchází B a zároveň B nepředchází A. Poslední uváděná možnost odpovídá situaci, kdy jsou události souběžné, ale ani v jednom z těchto případů není určeno pevné pořadí událostí v čase - mluvíme pouze o jejich kauzální souvislosti.", "a": false}, {"ch": "Súbežnosť a synchronizácia", "q": "Časový sled je abstrakce, která nám umožní skrývat detaily procesů (dějů), které nemají pevně určené pořadí kroků v čase. Popíšeme-li vnější chování takového procesu (děje) časovým sledem S, může dojít ke konfliktu, kdy některé běhy kompatibilní s S vedou na vnější chování A a jiné běhy, které jsou také s S kompatibilní, vedou na odlišné vnější chování B. Této situaci říkáme hazard souběhu.", "a": false}, {"ch": "Súbežnosť a synchronizácia", "q": "Souběžná datová závislost je typ hazardu souběhu, při kterém vlákno A zapisuje do paměťové buňky, vlákno B z téže buňky čte, akce čtení a zápisu jsou souběžné a zároveň další chování vlákna B závisí na přečtené hodnotě. Existují pak konzistentní časové sledy, kdy čtení předběhne zápis, přečte nesprávnou hodnotu a celkový výsledek je tedy také nesprávný. Tato chyba se sice neprojevuje při každém spuštění, ale protože problémové akce jsou souběžné, správný a špatný výsledek budeme dostávat přibližně stejně často.", "a": false}, {"ch": "Súbežnosť a synchronizácia", "q": "Relace př cké sekce.", "a": false}, {"ch": "Synchronizace", "q": "Monitor je jednoduchou ale velmi užitečnou abstrakcí - uvažme datovou strukturu, která sestává z nějaké datové reprezentace a operací nad ní. Realizace jednotlivé operace je často kritickou sekcí vůči ostatním operacím (to platí zejména pro ty operace, které strukturu mění) a proto musí být odpovídajícím způsobem chráněna. Princip monitoru spočívá v tom, že každé instanci takové datové struktury přidružíme jeden mutex, a každá operace (realizovaná podprogramem) na svém začátku mutex zamkne a před svým koncem opět odemkne. Takto implementované zamykání je bezpečné a optimální (přidává do programu pouze nezbytně nutné minimum synchronizace).", "a": false}, {"ch": "Synchronizace", "q": "Rychlý mutex je konkrétní implementace mutexu, která vyžaduje součinnost operačního systému, aby mohla být čekající vlákna uspána a nemusela tak aktivně čekat. Zároveň ale minimalizuje případy, kdy je interakce s operačním systémem nutná, protože taková interakce je relativně drahá. Uživatelská část stavu je tvořena počitadlem vláken, která se pokusila o zamčení, zatímco operační systém udržuje frontu vláken, která čekají na odemčení. Při pokusu o zamčení již zamčeného mutexu vlákno požádá o zařazení do fronty, při odemčení vlastník, je-li to potřeba, požádá operační systém o probuzení některého čekajícího vlákna.", "a": true}, {"ch": "Synchronizace", "q": "Spinlock je konkrétní implementace mutexu. Jeho konkrétní stavy přesně korespondují s těmi abstraktními definovanými mutexem, lze je tedy zakódovat do jediného bitu (nicméně v paměti se obvykle pro spinlock použije alespoň jeden bajt). Při implementaci spinlocku je nutné věnovat pozornost operaci zamčení, která při naivní implementaci operacemi load a store nebude fungovat správně - proto se obvykle v implementaci využívá speciální operace „atomic store“ která zabezpečí, že zápis je okamžitě viditelný všemi výpočetními jádry.", "a": false}, {"ch": "Synchronizace", "q": "Synchronizační zařízení představuje způsob, jak omezit nežádoucí souběžnost. Různá synchronizační zařízení jsou vhodná k řešení různých problémů souběžnosti, mají ale několik společných vlastností. Asi nejdůležitější z nich je, že mají nějaký stav, který se může prováděním operací na dané instanci zařízení měnit.", "a": true}, {"ch": "Synchronizace", "q": "Mutex (zařízení pro vzájemné vyloučení) je abstraktní synchronizační zařízení, které má dva stavy - odemčen a uzamčen - a dvě operace - odemčení a zamčení. Obě operace jsou povoleny kdykoliv, ale pokus o zamčení již zamčeného, nebo o odemčení již odemčeného mutexu musí vyčkat, než ho jeho současný vlastník přepne do opačného stavu. Základním použitím mutexu je ochrana kritické sekce.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Komunikace mezi souběžnými entitami (např. vlákny) je většinou, ale ne vždy formou synchronizace - je-li přečtena nějaká hodnota, kterou předtím někdo zapsal, odpovídající události musí být relací předcházení uspořádané, přitom akce zápisu a čtení musí být souběžné. Do události „přečteno“ tedy přichází souběžné akce, což je definiční vlastnost synchronizace.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Kruhová fronta je konkrétní implementace komunikační fronty, kterou lze implementovat bez použití vzájemného vyloučení (zámku). Sestává z pevně velkého pole hodnot a dvou ukazatelů, jednoho určeného pro čtení (R) a jednoho pro zápis (W). Vlákno, které prvky vkládá mění ukazatel W a ukazatel R pouze čte, a naopak, vlákno které prvky odebírá mění ukazatel R a ukazatel W pouze čte. Díky tomu je možné prvky do fronty vkládat souběžně s odebíráním nějakých jiných.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Úkolem zprostředkovatele v systému předávání zpráv je převzít zprávu od odesílatele a dodat ji adresátovi. K tomu musí mít k dispozici nějaký stávající komunikační kanál, kterým zprávu fyzicky doručí - může se jednat např. o sdílenou paměť, síťové spojení atp. Každý systém předávání zpráv má alespoň jednoho zprostředkovatele, ale některé jich můžou mít i několik.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Rezervace je alternativou k virtualizaci, ale není s ní vzájemně výlučná - lze si např. představit, že aplikace si může rezervovat nějakou zaručenou kapacitu jinak virtualizovaného zdroje. Takto rezervovaná kapacita musí být po dobu platnosti rezervace ze systému virtualizace vyloučena (tzn. nesmí být sdílená s jinou entitou, např. procesem). Rezervace samozřejmě nemusí být v danou chvíli možná, protože potřebný zdroj nemusí být zrovna k dispozici - aplikace pak musí na zdroj vyčkat, nebo se obejít bez něj.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Ke komunikaci lze teoreticky použít libovolnou datovou strukturu chráněnou vhodným synchronizačním zařízením, např. mutexem nebo monitorem. Problém tohoto uspořádání je soutěž (contention) o příslušný zámek - z takto chráněné datové struktury není možné zároveň číst (nebo z ní dokonce odebírat prvky) a zároveň do ní zapisovat (přidávat prvky). Proto je tento typ struktury pro komunikaci v praxi zcela nevhodný - je nutné použít specializované komunikační zařízení.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Rezervace je alternativou k virtualizaci, ale není s ní vzájemně výlučná - lze si např. představit, že aplikace si může rezervovat nějakou zaručenou kapacitu jinak virtualizovaného zdroje. Takto rezervovaná kapacita musí být po dobu platnosti rezervace ze systému virtualizace vyloučena (tzn. nesmí být sdílená s jinou entitou, např. procesem). U virtualizovaných zdrojů navíc rezervace nemůže selhat - takového zdroje je k dispozici libovolné množství.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Úkolem zprostředkovatele v systému předávání zpráv je převzít zprávu od odesílatele a dodat ji adresátovi. K tomu musí mít k dispozici nějaký stávající komunikační kanál, kterým zprávu fyzicky doručí - může se jednat např. o sdílenou paměť, síťové spojení, atp. Konkrétní systémy předávání zpráv mají zpravidla alespoň jednoho zprostředkovatele, ale není to nutné - systém předávání zpráv lze realizovat i bez něj.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Ke komunikaci lze použít libovolnou datovou strukturu chráněnou vhodným synchronizačním zařízením, např. mutexem nebo monitorem. Problém tohoto uspořádání je soutěž (contention) o příslušný zámek - z takto chráněné datové struktury není možné zároveň číst (nebo z ní dokonce odebírat prvky) a zároveň do ní zapisovat (přidávat prvky). Pro občasnou komunikaci ale může být tento typ struktury i přes svá omezení vhodný.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Kruhová fronta je konkrétní implementace komunikační fronty, kterou lze implementovat bez použití vzájemného vyloučení (zámku). Sestává z pevně velkého pole hodnot a dvou ukazatelů, jednoho určeného pro čtení (R) a jednoho pro zápis (W). Vlákno, které prvky vkládá ukazatele R a W mění, zatímco vlákno, které prvky odebírá, oba ukazatele pouze čte. Díky tomu je možné prvky do fronty vkládat souběžně s odebíráním nějakých jiných.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Komunikace mezi souběžnými entitami (např. vlákny) je většinou, ale ne vždy formou synchronizace - je-li přečtena nějaká hodnota, kterou předtím někdo zapsal, odpovídající události musí být relací předcházení uspořádané, přitom akce zápisu a čtení musí být souběžné. Do události „přečteno“ tedy přichází souběžné akce, což je definiční vlastnost synchronizace.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Ke komunikaci lze použít libovolnou datovou strukturu chráněnou vhodným synchronizačním zařízením, např. mutexem nebo monitorem. Problém tohoto uspořádání je soutěž (contention) o příslušný zámek - z takto chráněné datové struktury není možné zároveň číst (nebo z ní dokonce odebírat prvky) a zároveň do ní zapisovat (přidávat prvky). Pro občasnou komunikaci ale může být tento typ struktury i přes svá omezení vhodný.", "a": true} někdo zapsal, odpovídající události musí být relací předcházení uspořádané, přitom akce zápisu a čtení musí být souběžné. Do události „přečteno“ tedy přichází souběžné akce, což je definiční vlastnost synchronizace.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Kruhová fronta je konkrétní implementace komunikační fronty, kterou lze implementovat bez použití vzájemného vyloučení (zámku). Sestává z pevně velkého pole hodnot a dvou ukazatelů, jednoho určeného pro čtení (R) a jednoho pro zápis (W). Vlákno, které prvky vkládá mění ukazatel W a ukazatel R pouze čte, a naopak, vlákno které prvky odebírá mění ukazatel R a ukazatel W pouze čte. Díky tomu je možné prvky do fronty vkládat souběžně s odebíráním nějakých jiných.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Rezervace je alternativou k virtualizaci, ale není s ní vzájemně výlučná - lze si např. představit, že aplikace si může rezervovat nějakou zaručenou kapacitu jinak virtualizovaného zdroje. Takto rezervovaná kapacita musí být po dobu platnosti rezervace ze systému virtualizace vyloučena (tzn. nesmí být sdílená s jinou entitou, např. procesem). Rezervace samozřejmě nemusí být v danou chvíli možná, protože potřebný zdroj nemusí být zrovna k dispozici - aplikace pak musí na zdroj vyčkat, nebo se obejít bez něj.", "a": true}, {"ch": "Komunikace a uváznutí", "q": "Úkolem zprostředkovatele v systému předávání zpráv je převzít zprávu od odesílatele a dodat ji adresátovi. K tomu musí mít k dispozici nějaký stávající komunikační kanál, kterým zprávu fyzicky doručí - může se jednat např. o sdílenou paměť, síťové spojení atp. Každý systém předávání zpráv má alespoň jednoho zprostředkovatele, ale některé jich můžou mít i několik.", "a": false}, {"ch": "Komunikace a uváznutí", "q": "Ke komunikaci lze teoreticky použít libovolnou datovou strukturu chráněnou vhodným synchronizačním zařízením, např. mutexem nebo monitorem. Problém tohoto uspořádání je soutěž (contention) o příslušný zámek - z takto chráněné datové struktury není možné zároveň číst (nebo z ní dokonce odebírat prvky) a zároveň do ní zapisovat (přidávat prvky). Proto je tento typ struktury pro komunikaci v praxi zcela nevhodný - je nutné použít specializované komunikační zařízení.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Obsluha přerušení je obvykle časově kritickou operací, a to hned z několika důvodů: vlákno, které bylo přerušeno, je zablokováno až do doby než je obsluha přerušení ukončena, během obsluhy přerušení jsou zpravidla další přerušení blokována, atp. Proto je žádoucí veškerou práci, kterou není nutné provést přímo v obsluze přerušení, odložit na později. Časově nekritické části obsluhy přerušení jsou tedy naplánovány na pozdější spuštění v méně omezeném kontextu.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizaci periferií a softwaru, přitom z čistě softwarových synchronizačních zařízení se nejvíce podobá podmínkové proměnné. Důležitým rozdílem oproti softwarovým synchronizačním zařízením je, že přerušení je asymetrické: signalizovat jej může pouze periferie a reagovat na něj může pouze software (není tedy možné přerušením vyžádat pozornost periferie).", "a": true}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze - periferie místo toho signalizuje dokončení přenosu přerušením. Protože operační paměti je k dispozici velké množství, není tento typ přerušení příliš citlivý na rychlost reakce operačního systému.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Ve chvíli, kdy přerušení nastane, může procesor právě vykonávat nějakou jinou činnost. Až na situace, kdy je přerušení krátkodobě explicitně zakázáno, procesor tuto činnost přeruší, uloží kontext, který bude nutný pro pokračování v takto přerušené činnosti a spustí obsluhu přerušení. Obslužný podprogram je spuštěn ve stejném režimu, v jakém byl procesor ve chvíli, kdy k přerušení došlo, přesto ale považujeme obsluhu přerušení za součást jádra.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J (například proto, že I je kritickou sekcí vůči J nebo naopak). Přitom nemůžeme zaručit, že J v době přerušení nebude běžet na procesoru C. V této situaci je bezpečné použít k synchronizaci mezi I a J spinlock.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizaci periferií a softwaru, přitom z čistě softwarových synchronizačních zařízení se nejvíce podobá semaforu. Důležitým rozdílem oproti softwarovým synchronizačním zařízením je, že přerušení je asymetrické: signalizovat jej může pouze periferie a reagovat na něj může pouze software (není tedy možné přerušením vyžádat pozornost periferie).", "a": false}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze - periferie místo toho signalizuje dokončení přenosu přerušením. Tento typ přerušení je při vyšších přenosových rychlostech citlivý na rychlost reakce operačního systému.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J (například proto, že I je kritickou sekcí vůči J nebo naopak). Přitom nemůžeme zaručit, že J v době přerušení nebude běžet na procesoru C. V této situaci je bezpečné použít k synchronizaci mezi I a J spinlock.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Ve chvíli, kdy přerušení nastane, může procesor právě vykonávat nějakou jinou činnost. Až na situace, kdy je přerušení krátkodobě explicitně zakázáno, procesor tuto činnost přeruší, uloží kontext, který bude nutný pro pokračování v takto přerušené činnosti a spustí obsluhu přerušení. Obslužný podprogram je vždy spuštěn v privilegovaném režimu, bez ohledu na to, v jakém režimu byl procesor do této chvíle - z tohoto důvodu považujeme obsluhu přerušení za součást jádra.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Obsluha přerušení je obvykle časově kritickou operací, a to hned z několika důvodů: vlákno, které bylo přerušeno, je zablokováno až do doby než je obsluha přerušení ukončena, během obsluhy přerušení jsou zpravidla další přerušení blokována, atp. Proto je nutné obslužné podprogramy implementovat přímo pro daný procesor (v jazyce symbolických adres - assembleru) a nikoliv v jazyce vyšší úrovně (např. jazyce C).", "a": false}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J (například proto, že I je kritickou sekcí vůči J nebo naopak). Přitom nemůžeme zaručit, že J v době přerušení nebude běžet na procesoru C. V této situaci je bezpečné použít k synchronizaci mezi I a J spinlock.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze - periferie místo toho signalizuje dokončení přenosu přerušením. Protože operační paměti je k dispozici velké množství, není tento typ přerušení příliš citlivý na rych u přerušení za součást jádra.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J (například proto, že I je kritickou sekcí vůči J nebo naopak). Přitom nemůžeme zaručit, že J v době přerušení nebude běžet na procesoru C. V této situaci je bezpečné použít k synchronizaci mezi I a J spinlock", "a": false}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze - periferie místo toho signalizuje dokončení přenosu přerušením. Protože operační paměti je k dispozici velké množství, není tento typ přerušení příliš citlivý na rychlost reakce operačního systému.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Obsluha přerušení je obvykle časově kritickou operací, a to hned z několika důvodů: vlákno, které bylo přerušeno, je zablokováno až do doby než je obsluha přerušení ukončena, během obsluhy přerušení jsou zpravidla další přerušení blokována, atp. Proto je nutné obslužné podprogramy implementovat přímo pro daný procesor (v jazyce symbolických adres - assembleru) a nikoliv v jazyce vyšší úrovně (např. jazyce C).", "a": false}, {"ch": "Prerušenie a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizaci periferií a softwaru, přitom z čistě softwarových synchronizačních zařízení se nejvíce podobá podmínkové proměnné. Důležitým rozdílem oproti softwarovým synchronizačním zařízením je, že přerušení je asymetrické: signalizovat jej může pouze periferie a reagovat na něj může pouze software (není tedy možné přerušením vyžádat pozornost periferie).", "a": true}, {"ch": "Prerušenie a periferie", "q": "Uvažme situaci, kdy potřebujeme synchronizovat obsluhu přerušení I vyvolanou procesorovým jádrem C s nějakou jinou částí operačního systému J, protože že I je kritickou sekcí vůči I. Přitom sice nemůžeme zaručit, že J v době přerušení nebude běžet na procesoru C, ale můžeme zaručit, že J nelze spustit na žádném jiném procesorovém jádře. V této situaci je bezpečné použít k synchronizaci dočasný zákaz přerušení.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Ve chvíli, kdy přerušení nastane, může procesor právě vykonávat nějakou jinou činnost. Až na situace, kdy je přerušení krátkodobě explicitně zakázáno, procesor tuto činnost přeruší, uloží kontext, který bude nutný pro pokračování v takto přerušené činnosti a spustí obsluhu přerušení. Obslužný podprogram je vždy spuštěn v privilegovaném režimu, bez ohledu na to, v jakém režimu byl procesor do této chvíle - z tohoto důvodu považujeme obsluhu přerušení za součást jádra.", "a": true}, {"ch": "Prerušenie a periferie", "q": "Obsluha přerušení je obvykle časově kritickou operací, a to hned z několika důvodů: vlákno, které bylo přerušeno, je zablokováno až do doby než je obsluha přerušení ukončena, během obsluhy přerušení jsou zpravidla další přerušení blokována, atp. Proto je nutné obslužné podprogramy implementovat přímo pro daný procesor (v jazyce symbolických adres - assembleru) a nikoliv v jazyce vyšší úrovně (např. jazyce C).", "a": false}, {"ch": "Prerušenie a periferie", "q": "Přerušení je mechanismus, který umožňuje synchronizaci periferií a softwaru, přitom z čistě softwarových synchronizačních zařízení se nejvíce podobá podmínkové proměnné. Podobně jako většina softwarových synchronizačních zařízení, přerušení je symetrické: signalizovat i reagovat může jak periferie tak software.", "a": false}, {"ch": "Prerušenie a periferie", "q": "Některé periferie používají pro přenos dat DMA, tzn. zapisují data do operační paměti souběžně s běžným provozem zbytku systému. Tyto přenosy je ale nutné synchronizovat s operačním systémem. Směrem k periferii je synchronizace realizována zápisem do registru, opačným směrem ale podobný mechanismus použít nelze - periferie místo toho signalizuje dokončení přenosu přerušením. Protože operační paměti je k dispozici velké množství, není tento typ přerušení příliš citlivý na rychlost reakce operačního systému.", "a": false}, {"ch": "Síť a sockety", "q": "Téměř každý operační systém poskytuje implementaci protokolů rodiny TCP/IP: jedná se totiž o protokoly, které se používají na internetu. V systémech POSIX slouží k práci s těmito protokoly tzv. sockety, které používají API podobné tomu pro práci se soubory. U spojovaných protokolů (TCP, UDP) odpovídá socket právě jednomu spojení. Nespojované protokoly (ICMP, ARP) se sockety přímo používat nelze.", "a": false}, {"ch": "Síť a sockety", "q": "Protokol TCP používá k zlepšení spolehlivosti komunikace tzv. potvrzovací zprávy (ACK): potvrzování je realizováno pomocí tzv. sekvenčních čísel: jednotlivé pakety jsou očíslovány v pořadí odeslání, a příjemce při nejbližší příležitosti oznámí odesílateli, která čísla paketů již viděl. Odesílatel u každého paketu vyčká na potvrzení, až poté odešle další paket. Nedorazí-li potvrzení v předem domluveném čase, pošle znovu předchozí paket.", "a": false}, {"ch": "Síť a sockety", "q": "Protokol IP je protokolem třetí vrstvy modelu ISO/OSI a může být tedy realizován na různých instancích nižších vrstev (nejčastěji ale na Ethernetu). Pro doručení paketů protokolu IP musí mít systém k dispozici tzv. hardwarovou adresu (v případě Ethernetu známou jako MAC). Pro překlad mezi adresami IP a adresami nižší vrstvy slouží protokol ARP [Address Resolution Protocol], který pracuje podobně jako DNS: servery ARP udržují globální databázi IP adres a jim odpovídajících MAC adres.", "a": false}, {"ch": "Síť a sockety", "q": "Pro překlad lidsky zapamatovatelných jmen počítačů na IP adresy se používá tzv. protokol DNS. Jedná se o hierarchický systém jmen, kde jsou jednotlivé úrovně odděleny tečkou, v „little endian“ pořadí (např. www.fi.muni.cz). Organizace DNS serverů odpovídá hierarchické struktuře jmen a překlad jména postupuje rekurzí zprava doleva.", "a": true}, {"ch": "Síť a sockety", "q": "Krom specializovaných operací <send> a <recv> je se sockety možné používat i obecné <write> a <read>. Díky tomu je možné programovat vstupně-výstupní podprogramy obecně - stejný podprogram může data vypsat na obrazovku nebo odeslat po síti, podle toho jaký typ objektu se skrývá za předaným popisovačem. Pomineme-li efekty souběžnosti, u většiny objektů celkový výsledek nezáleží na počtu operací <write>, které provedeme, jsou-li zapsány stejné bajty ve stejném pořadí. Důležitou výjimku tvoří datagramové sockety, kde vznikne každým použitím <write> nový datagram.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Samotný jazyk C se ale v současnosti již v implementaci operačních systémů nepoužívá, jedná se skutečně pouze o jazyk poskytovaného rozhraní.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám řadu výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Sdílené knihovny také zjednodušují aktualizace systému: novou verzi knihovny můžou aplikace obvykle využívat bez jakéhokoliv zásahu do aplikace samotné.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Na rozdíl od jádra se systémové knihovny za běhu programu stávají de-facto jeho součástí, jejich kód je totiž namapován do stejného adresního prostoru, a vykonává se se stejnou úrovní oprávnění.", "a": true}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány jako tzv. archivy: soubory, které obsahují kolekci objektových souborů a případně metadata, která usnadní práci linkeru. Při sestavování programu se statické knihovny chovají jako monolitický celek: linker použije vždy všechny části (objektové soubory), které se v daném archivu nachází.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů otevřených souborů [file descriptor], kterou operační systém udržuje pro každý proces. Tato tabulka asociuje jednotlivé otevřené soubory s cestami v souborovém systému, a umožňuje programu číst a zapisovat data pomocí systémových volání read a write.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám řadu výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Sdílené knihovny také zjednodušují aktualizace systému: novou verzi knihovny můžou aplikace obvykle využívat bez jakéhokoliv zásahu do aplikace samotné.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Samotný jazyk C se ale v současnosti již v implementaci operačních systémů nepoužívá, jedná se skutečně pouze o jazyk poskytovaného rozhraní.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Podobně jako jádro běží systémové knihovny s vyšší úrovní oprávnění, než samotná aplikace. Systémové knihovny můžou být statické nebo sdílené, ale preferovány jsou většinou ty sdílené, a to ze dvou důvodů: umožňuje to dodavateli OS dodatečně opravit případné chyby (bez spolupráce dodavatelů aplikačních programů) a zároveň se tím šetří prostředky (zejména paměť).", "a": false}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány jako tzv. archivy: soubory, které obsahují kolekci objektových souborů a případně metadata, která usnadní práci linkeru. Při sestavování programu se statické knihovny chovají jako monolitický celek: linker použije vždy všechny části (objektové soubory), které se v daném archivu nachází.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů otevřených souborů [file descriptor], kterou operační systém udržuje pro každý proces. Tato tabulka asociuje jednotlivé otevřené soubory s jejich i-uzly na disku, a umožňuje programu číst a zapisovat data pomocí systémových volání read a write.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Podobně jako jádro běží systémové knihovny s vyšší úrovní oprávnění, než samotná aplikace. Systémové knihovny můžou být statické nebo sdílené, ale preferovány jsou většinou ty sdílené, a to ze dvou důvodů: umožňuje to dodavateli OS dodatečně opravit případné chyby (bez spolupráce dodavatelů aplikačních programů) a zároveň se tím šetří prostředky (zejména paměť).", "a": false}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám řadu výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Sdílené knihovny také zjednodušují aktualizace systému: novou verzi knihovny můžou aplikace obvykle využívat bez jakéhokoliv zásahu do aplikace samotné.", "a": true}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány jako tzv. archivy: soubory, které obsahují kolekci objektových souborů. Na rozdíl od sdílených knihoven se ty statické navíc při sestavování programu kopírují do výsledného spustitelného souboru, a stávají se jeho součástí. Sdílené knihovny naopak načte operační systém ze samostatných souborů až při spuštění programu.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Samotný jazyk C se ale v současnosti již v implementaci operačních systémů nepoužívá, jedná se skutečně pouze o jazyk poskytovaného rozhraní.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů otevřených souborů [file descriptor], kterou operační systém udržuje pro každý proces. Tato tabulka asociuje jednotlivé otevřené soubory s cestami v souborovém systému, a umožňuje programu číst a zapisovat data pomocí systémových volání read a write.", "a": false}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány stejně jako sdílené, tzn. jako soubor typu ELF, který už je částečně sestavený [linked]. Rozdíl mezi statickou a sdílenou knihovnou je zejména v procesu sestavování programů: při sestavování programu se statické knihovny kopírují do výsledného spustitelného souboru, a stávají se jeho součástí. Sdílené knihovny naopak načte operační systém ze samostatných souborů až při spuštění programu.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Zároveň je jazyk C často i implementačním jazykem nižších vrstev operačního systému.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám několik výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Statické knihovny naopak zjednodušují aktualizace systému: novou verzi knihovny můžou v tomto případě již sestavené programy využívat bez jakéhokoliv zásahu do spustitelných souborů.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Na rozdíl od jádra se systémové knihovny za běhu programu stávají de-facto jeho součástí, jejich kód je totiž namapován do stejného adresního prostoru, a vykonává se se stejnou úrovní oprávnění. Systémové knihovny můžou být statické nebo sdílené, ale preferovány jsou většinou ty sdílené, a to ze dvou důvodů: umožňuje to dodavateli OS jednodušeji opravit případné chyby a zároveň se tím šetří prostředky (zejména paměť).", "a": true}, {"ch": "POSIX a jazyk C", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů otevřených souborů [file descriptor], kterou operační systém udržuje pro každý proces. Tato tabulka asociuje jednotlivé otevřené soubory s cestami v souborovém systému, a umožňuje programu číst a zapisovat data pomocí systémových volání read a write.", "a": false}, {"ch": "POSIX a jazyk C", "q": "V systémech POSIX jsou statické knihovny realizovány jako tzv. archivy: soubory, které obsahují kolekci objektových souborů a případně metadata, která usnadní práci linkeru. Při sestavování programu se statické knihovny chovají jako monolitický celek: linker použije vždy všechny části (objektové soubory), které se v daném archivu nachází.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Chce-li program pracovat s obsahem souboru, musí nejprve tento soubor otevřít. Tímto úkonem vznikne záznam v tzv. tabulce popisovačů otevřených souborů [file descriptor], kterou operační systém udržuje pro každý proces. Tato tabulka asociuje jednotlivé otevřené soubory s cestami v souborovém systému, a umožňuje programu číst a zapisovat data pomocí systémových volání read a write.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Většina operačních systémů poskytuje své základní API jako sbírku funkcí jazyka C. Je tomu tak proto, že jazyk C je přenositelný mezi hardwarovými architekturami, ale zároveň je dostatečně nízkoúrovňový: zavolat funkci jazyka C je velice jednoduché a lze tak učinit z většiny programovacích jazyků. Zároveň je jazyk C často i implementačním jazykem nižších vrstev operačního systému.", "a": true}, {"ch": "POSIX a jazyk C", "q": "Sdílené knihovny mají proti statickým knihovnám několik výhod: jednak šetří místo na disku, protože stačí, aby existovaly v jedné společné kopii, zároveň šetří i místo v paměti, protože operační systém danou knihovnu do RAM uloží pouze jednou, i když je využívána více současně běžícími programy. Statické knihovny naopak zjednodušují aktualizace systému: novou verzi knihovny můžou v tomto případě již sestavené programy využívat bez jakéhokoliv zásahu do spustitelných souborů.", "a": false}, {"ch": "POSIX a jazyk C", "q": "Systémové knihovny jsou součástí operačního systému: jejich smyslem je poskytovat aplikacím základní služby. Na rozdíl od jádra se systémové knihovny za běhu programu stávají de-facto jeho součástí, jejich kód je totiž namapován do stejného adresního prostoru, a vykonává se se stejnou úrovní oprávnění.", "a": true}, {"ch": "Jadro", "q": "Systémové volání se podobá na klasické volání funkce jazyka C, zejména v tom, že mu lze předat parametry, a krom vedlejších efektů je jeho výsledkem návratová hodnota. V závislosti na architektuře a operačním systému lze argumenty předávat v paměti (na zásobníku) nebo v registrech. Podobně jako u běžného volání funkce se jednotlivá systémová volání rozlišují cílovou adresou, které se odevzdá řízení. Proto je také nutné při změně jádra programy znovu sestavit (slinkovat) – adresy jednotlivých podprogramů jádra se mohou změnit.", "a": false}, {"ch": "Jadro", "q": "Po zapnutí je potřeba uvést počítač do provozuschopného stavu za pomoci dat uložených v trvalém úložišti (pevný disk). Speciální program (tzv. bootloader) najde a načte jádro a případná další potřebná data, a předá mu řízení. Jádro postupně nastaví procesor, stránkové tabulky, jednotlivé periferie, připojí souborový systém a vytvoří první uživatelský proces, který je odpovědný za start uživatelské části OS.", "a": true}, {"ch": "Jadro", "q": "Jádro je v běžném operačním systému jediná komponenta, která běží v privilegovaném režimu. Proto má na starost zejména úkoly, které lze provádět pouze v tomto režimu, například nastavení jednotky správy paměti (MMU) nebo obsluhu přerušení. Další obvyklou součástí jádra je plánování vláken a procesů, je totiž navázáno na obsluhu přerušení časovače. Jedná-li se o mikrojádro, nachází se v něm ale celá řada dalších komponent: ovladače zařízení, souborové systémy, síťová vrstva atd.", "a": false}, {"ch": "Jadro", "q": "Protože jádro běží v jiném režimu než zbytek systému, musí pro využívání jeho služeb existovat speciální mechanismus, který bezpečně předá řízení a zároveň přepne procesor: tento mechanismus se nazývá systémové volání. Jednou z možností jak toto realizovat je tzv. softwarové přerušení: speciální instrukce vyvolá přerušení, které stejně jako libovolné jiné přepne procesor do privilegovaného režimu a spustí příslušný obslužný podprogram, který je součástí jádra.", "a": true}, {"ch": "Jadro", "q": "Jádro operačního systému běží v privilegovaném režimu procesoru, do kterého lze vstoupit pouze hardwarovým přerušením. Jednou z důležitých vlastností privilegovaného režimu je možnost programovat jednotku správy paměti, která se používá k implementaci izolace procesů.", "a": false}, {"ch": "Jadro", "q": "Jádro operačního systému běží v privilegovaném režimu procesoru, do kterého lze vstoupit pouze hardwarovým přerušením. Jednou z důležitých vlastností privilegovaného režimu je možnost programovat jednotku správy paměti, která se používá k implementaci izolace procesů.", "a": false}, {"ch": "Jadro", "q": "Jádro je v běžném operačním systému jediná komponenta, která běží v privilegovaném režimu. Musí tedy mít na starost úkoly, které v uživatelském režimu vykonávat nelze, zejména nastavení jednotky správy paměti (MMU) a obsluhu přerušení. Protože plánování vláken a procesů je navázáno na obsluhu přerušení časovače, toto je také obvyklou součástí jádra. Jedná-li se o jádro monolitické, nachází se v něm ale celá řada dalších komponent: ovladače zařízení, souborové systémy, síťová vrstva atd.", "a": true}, {"ch": "Jadro", "q": "Stav počítače obvykle nelze udržovat bez napájení: proto je potřeba po zapnutí uvést počítač do provozuschopného stavu za pomoci dat uložených v trvalém úložišti (pevný disk). Speciální program (tzv. bootloader) najde a načte jádro a případně další data, a předá mu řízení. Po dokončení své vlastní inicializace vytvoří jádro první uživatelský proces, který pak nastartuje systémové služby a umožní uživatelům přihlásit se (log in).", "a": true}, {"ch": "Jadro", "q": "Systémové volání se podobá na klasické volání funkce jazyka C, zejména v tom, že mu lze předat parametry, a krom vedlejších efektů je jeho výsledkem návrato let questions = [...ALL_QUESTIONS];
let answers = {};
let current = 0;
let filter = 'all';
let activeChapter = 'all';

function getChapterQuestions(ch) {
  return ch === 'all' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.ch === ch);
}
function onChapterChange() {
  activeChapter = document.getElementById('chapterSelect').value;
  questions = getChapterQuestions(activeChapter);
  answers = {}; current = 0; filter = 'all'; render();
}
function goToQuestion() {
  const input = document.getElementById('searchInput');
  const errEl = document.getElementById('searchErr');
  const val = parseInt(input.value);
  if (isNaN(val) || val < 1 || val > ALL_QUESTIONS.length) {
    errEl.textContent = `Zadaj číslo od 1 do ${ALL_QUESTIONS.length}`;
    errEl.style.display = 'block'; return;
  }
  errEl.style.display = 'none';
  const targetQ = ALL_QUESTIONS[val - 1];
  if (activeChapter !== 'all' && targetQ.ch !== activeChapter) {
    activeChapter = 'all';
    document.getElementById('chapterSelect').value = 'all';
    questions = [...ALL_QUESTIONS]; answers = {};
  }
  filter = 'all';
  current = questions.indexOf(targetQ);
  input.value = ''; render();
}
function filtered() {
  if (filter === 'all') return questions;
  if (filter === 'unanswered') return questions.filter((q) => answers[questions.indexOf(q)] === undefined);
  if (filter === 'wrong') return questions.filter((q) => {
    const gi = questions.indexOf(q);
    return answers[gi] !== undefined && answers[gi] !== q.a;
  });
  return questions;
}
function render() {
  const app = document.getElementById('app');
  const total = questions.length;
  const correct = questions.filter((q,i) => answers[i] === q.a).length;
  const wrong = questions.filter((q,i) => answers[i] !== undefined && answers[i] !== q.a).length;
  const answered = Object.keys(answers).length;
  const remaining = total - answered;

  if (answered === total && filter === 'all') {
    const pct = Math.round(correct / total * 100);
    app.innerHTML = `<div class="end">
      <div class="end-score" style="color:${pct>=70?'#2a7a4f':'#c0392b'}">${pct}%</div>
      <div class="end-sub">${correct} z ${total} správne &nbsp;·&nbsp; ${wrong} chybne</div>
      <button class="ctrl-btn primary" onclick="restart()">Zopakovať od začiatku</button>
      <button class="ctrl-btn" style="margin-left:8px" onclick="showWrong()">Pozrieť chybné (${wrong})</button>
    </div>`;
    return;
  }
  const qs = filtered();
  if (qs.length === 0) {
    app.innerHTML = `<div style="text-align:center;padding:2rem"><p>Žiadne otázky vo filtri.</p><button class="ctrl-btn" onclick="setFilter('all')">Zobraziť všetky</button></div>`;
    return;
  }
  const di = Math.min(current, qs.length - 1);
  const q = qs[di];
  const gi = questions.indexOf(q);
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  const ua = answers[gi];
  const revealed = ua !== undefined;

  let tClass = 'btn-tf', fClass = 'btn-tf';
  if (revealed) {
    if (ua === true)  tClass += q.a === true  ? ' bt-correct' : ' bt-wrong';
    if (ua === false) fClass += q.a === false ? ' bt-correct' : ' bt-wrong';
  }
  const fb = revealed ? `<div class="feedback ${ua===q.a?'fb-ok':'fb-no'}">
    ${ua===q.a ? '✓ Správne' : '✗ Nesprávne — správna odpoveď: <strong>'+(q.a?'PRAVDA':'NEPRAVDA')+'</strong>'}
  </div>` : '';

  app.innerHTML = `
    <div class="progress-outer"><div class="progress-inner" style="width:${Math.round(answered/total*100)}%"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-n n-c">${correct}</div><div class="stat-l">Správne</div></div>
      <div class="stat"><div class="stat-n n-w">${wrong}</div><div class="stat-l">Chybne</div></div>
      <div class="stat"><div class="stat-n n-r">${remaining}</div><div class="stat-l">Zostáva</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filter==='all'?'active':''}" onclick="setFilter('all')">Všetky (${total})</button>
      <button class="filter-btn ${filter==='unanswered'?'active':''}" onclick="setFilter('unanswered')">Nezodpovedané (${remaining})</button>
      <button class="filter-btn ${filter==='wrong'?'active':''}" onclick="setFilter('wrong')">Chybné (${wrong})</button>
      <button class="filter-btn" onclick="shuffle()">🔀 Zamiešať</button>
    </div>
    <div class="q-num">Otázka ${globalIdx+1} z ${ALL_QUESTIONS.length} &nbsp;·&nbsp; ${di+1}/${qs.length} vo filtri</div>
    <div class="card">
      <div class="ch-label">${q.ch}</div>
      <div class="q-text">${q.q}</div>
      <div class="btn-row">
        <button class="${tClass}" onclick="answer(${gi}, true)" ${revealed?'disabled':''}>✓ Pravda</button>
        <button class="${fClass}" onclick="answer(${gi}, false)" ${revealed?'disabled':''}>✗ Nepravda</button>
      </div>
      ${fb}
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prev()" ${current===0?'disabled':''}>← Späť</button>
      <button class="ctrl-btn primary" onclick="next()" ${di===qs.length-1?'disabled':''}>Ďalej →</button>
    </div>`;
}
function answer(gi, val) { answers[gi] = val; render(); }
function next() { const qs = filtered(); if (current < qs.length-1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function setFilter(f) { filter = f; current = 0; render(); }
function showWrong() { filter = 'wrong'; current = 0; render(); }
function shuffle() {
  for (let i = questions.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  answers = {}; current = 0; render();
}
function restart() {
  questions = getChapterQuestions(activeChapter);
  answers = {}; current = 0; filter = 'all'; render();
}
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  const qs = filtered();
  const q = qs[Math.min(current, qs.length-1)];
  const gi = questions.indexOf(q);
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if ((e.key === 'p' || e.key === 'P') && answers[gi] === undefined) answer(gi, true);
  else if ((e.key === 'n' || e.key === 'N') && answers[gi] === undefined) answer(gi, false);
});
render();
</script>
